/* ---------- HISTORIE ZÁZNAMŮ ----------
   Pokud je uživatel přihlášen (Auth), historie se ukládá NA SERVER (sdílená napříč zařízeními).
   Pokud není přihlášen, používá se localStorage (offline režim).
   Typy záznamů: 'offer' (nabídka), 'model' (modelace ROI), 'contract' (smlouva), 'export' (export). */
const HISTORY_KEY='elkoplast_lis_history_v1';
let _historyCache = null;   // cache serverových položek (refresh přes loadFromServer)

const History = {
  // Lokální (localStorage) — offline fallback
  _localAll(){ try{ return JSON.parse(lsGet(HISTORY_KEY)||'[]'); }catch(e){ return []; } },
  _localSave(list){ lsSet(HISTORY_KEY, JSON.stringify(list)); },
  
  // Veřejné API — vrací odpovídající zdroj
  all(){
    if(Auth.isLoggedIn() && _historyCache!=null) return _historyCache;
    return this._localAll();
  },
  
  // Načte ze serveru (volá se po loginu a periodicky při zobrazení historie)
  async loadFromServer(){
    if(!Auth.isLoggedIn()){ _historyCache=null; return; }
    try{
      const d = await Auth._req('/api/items','GET',null);
      // Map server items na formát kompatibilní s lokální historií
      _historyCache = (d.items||[]).map(it => ({ ...it.data, id: it.id, kind: it.kind, serverCreatedAt: it.createdAt }));
    }catch(e){
      console.warn('Nepodařilo se načíst historii ze serveru:', e.message);
      _historyCache = null;
    }
  },
  
  async add(entry, kind){
    kind = kind || entry.kind || 'offer';
    entry.kind = kind;
    if(Auth.isLoggedIn()){
      try{
        const d = await Auth._req('/api/items','POST',{kind, data: entry});
        entry.id = d.item.id;
        entry.serverCreatedAt = d.item.createdAt;
        if(_historyCache){ _historyCache.unshift(entry); if(_historyCache.length>500) _historyCache.length=500; }
        return entry;
      }catch(e){
        console.warn('Server uložení selhalo, ukládám lokálně:', e.message);
      }
    }
    // localStorage fallback
    const list = this._localAll();
    entry.id = 'h'+Date.now()+Math.floor(Math.random()*1000);
    list.unshift(entry);
    if(list.length>200) list.length=200;
    this._localSave(list);
    return entry;
  },
  
  get(id){
    if(Auth.isLoggedIn() && _historyCache) return _historyCache.find(e=>e.id===id)||null;
    return this._localAll().find(e=>e.id===id)||null;
  },
  
  async remove(id){
    if(Auth.isLoggedIn()){
      try{
        await Auth._req('/api/items/'+encodeURIComponent(id),'DELETE',null);
        if(_historyCache) _historyCache = _historyCache.filter(e=>e.id!==id);
        return;
      }catch(e){
        console.warn('Server smazání selhalo:', e.message);
      }
    }
    this._localSave(this._localAll().filter(e=>e.id!==id));
  },
  
  async clear(){
    if(Auth.isLoggedIn()){
      try{
        await Auth._req('/api/items','DELETE',null);
        _historyCache = [];
        return;
      }catch(e){
        console.warn('Server vymazání selhalo:', e.message);
      }
    }
    this._localSave([]);
  }
};

/* ---------- DOBA PRONÁJMU ----------
   termMode: 'years' (1–10 let) | 'months' (1–11 měs) | 'indefinite' (doba neurčitá) */
function termMonthsCount(){
  if(STATE.termMode==='indefinite') return Math.round((1/GP.odpis)*12); // plná amortizace (8 let → 96 měs)
  if(STATE.termMode==='months') return STATE.months;
  return STATE.years*12;
}
function termYears(){ return termMonthsCount()/12; }
function isIndefinite(){ return STATE.termMode==='indefinite'; }
function rokyWord(n){ return n===1?'rok':(n>=2&&n<=4?'roky':'let'); }
function mesicWord(n){ return n===1?'měsíc':(n>=2&&n<=4?'měsíce':'měsíců'); }
function termLabel(){
  if(STATE.termMode==='indefinite') return 'doba neurčitá';
  if(STATE.termMode==='months') return STATE.months+' '+mesicWord(STATE.months);
  return STATE.years+' '+rokyWord(STATE.years);
}
function termLabelShort(){
  if(STATE.termMode==='indefinite') return 'neurčitá';
  if(STATE.termMode==='months') return STATE.months+' měs';
  return STATE.years+' '+rokyWord(STATE.years);
}
/* Sleva za závazek — lineární škálování: slevaOd let → slevaMin, slevaDo let → slevaMax.
   Měsíční pronájem a doba neurčitá = bez slevy (není dlouhodobý závazek). */
function currentSleva(){
  if(STATE.termMode!=='years') return 0;
  const y=STATE.years;
  if(y<GP.slevaOd) return 0;
  if(y>=GP.slevaDo) return GP.slevaMax;
  const t=(y-GP.slevaOd)/(GP.slevaDo-GP.slevaOd);
  return GP.slevaMin + t*(GP.slevaMax-GP.slevaMin);
}

/* ---------- FINANČNÍ MODEL ----------
   Pronájem/měs = 2,5 % ze zvoleného základu (nákupní/prodejní) + servis/12.
   Jednorázové položky (doprava, instalace, zaškolení) se účtují ZVLÁŠŤ.
   Sleva za dlouhý závazek se aplikuje na nájem stroje, ne na servis. */
function oneTimeItems(p){
  const items=[{name:'Doprava',amount:+p.doprava||0}];
  ONE_TIME.forEach(it=>{ if((+it.amount||0)>0) items.push({name:it.name,amount:+it.amount}); });
  return items;
}
/* ---------- Fixní cenotvorba pro Zentex (mobilní lisovací stroje) ----------
   Bramidan používá sazbu 2,8 % × nákupní cena, ale Zentex stroje mají velký
   rozptyl nákupních cen (331 000 – 424 400 Kč), což by vedlo k nepřiměřeným
   nájmům. Místo toho Zentex používá fixní cenu podle objemu kontejneru:
     • 6 m³  → 8 500 Kč/měs
     • 20 m³ → 9 500 Kč/měs  (referenční hodnota)
     • 24 m³ → 10 500 Kč/měs (rozptyl ±1 000 Kč od cílové hodnoty)
   Efektivní sazba (% z nákupní ceny) se dopočítává zpětně a zobrazuje se
   v UI pro informaci obchodníka — pohybuje se cca 2,0–2,7 %. */
function zentexNajemDleObjemu(vol, nakupCena){
  const v = +vol || 0;
  if(v <= 0) return Math.round(nakupCena * 0.028);   // fallback pro chybějící objem
  if(v <= 6)  return 8500;
  if(v >= 24) return 10500;
  let rent;
  if(v <= 20){
    // 6 m³ → 8 500 ; 20 m³ → 9 500 (lineárně, slope 71,43 Kč/m³)
    rent = 8500 + (v - 6) / 14 * 1000;
  } else {
    // 20 m³ → 9 500 ; 24 m³ → 10 500 (lineárně, slope 250 Kč/m³)
    rent = 9500 + (v - 20) / 4 * 1000;
  }
  // Zaokrouhlení na 100 Kč pro čistá čísla v nabídce
  return Math.round(rent / 100) * 100;
}

/* Průměrná efektivní sazba % z nákupní ceny vč. servisu pro daný objem.
   Zentex cena z mřížky JE celková (vč. servisu) → sazba = cena_mřížky / průměr_nakup. */
function zentexAvgPct(vol){
  const samples = COMPACTORS.filter(c => c.vol === vol);
  if(!samples.length) return 0;
  const cenaCelkem = zentexNajemDleObjemu(vol, samples[0].nakup);
  const sum = samples.reduce((s, p) => s + cenaCelkem / p.nakup, 0);
  return sum / samples.length;
}

/* Cena Zentex dle objemu = celková cena VČETNĚ kompletního servisu.
   Tato funkce vrací stejnou hodnotu jako zentexNajemDleObjemu, jen jako abstrakce. */
function zentexAvgCelkemMesic(vol){
  const samples = COMPACTORS.filter(c => c.vol === vol);
  if(!samples.length) return 0;
  return zentexNajemDleObjemu(vol, samples[0].nakup);
}

/* ===== BRAMIDAN-STYLE LEASING ENGINE =====
   Anuita (TVM, END mode) podle metodiky Bramidan deku:
   PMT = (PV·(1+i)^N − FV) · i / ((1+i)^N − 1)
   - PV: pořizovací cena (nákup, bez DPH, po WHC slevě)
   - N:  počet měsíců (default 60)
   - iR: roční úrok (default 7,9 %)
   - FV: zůstatková hodnota (default 30 % z PV při N=60)

   Ověřeno na příkladech z deku:
   - B3, PV 4250 €, N 60, FV 1275 (30%), I 7,9 % → PMT ≈ 68 €/měs ✓
   - B3, PV 4250 €, N 96, FV 765 (18%), I 7,9 % → PMT ≈ 54 €/měs ✓
*/
function bramidanPMT(PV, N, iRocni, FV){
  if(!PV || !N || iRocni == null) return 0;
  const i = iRocni / 12;
  if(i === 0) return (PV - (FV||0)) / N;
  const f = Math.pow(1 + i, N);
  return (PV * f - (FV||0)) * i / (f - 1);
}

/* Zůstatková hodnota v % podle doby N (měsíců).
   Lineární vzorec — novější "going on 30 %" metoda:
   N=48→34%, N=60→30%, N=72→26%, N=84→22%, N=96→18%
   Vrací číslo v intervalu (0,1) - např. 0.30 pro 30 %.
*/
function residualPct(N){
  const v = 0.30 - 0.04 * (N - 60) / 12;
  return Math.max(0, Math.min(0.40, v)); // clip do rozumného rozsahu
}

/* Starší konzervativnější matice ze slide 20:
   N=60→28%, N=72→24%, N=84→20%, N=96→16% */
function residualPctOld(N){
  const v = 0.28 - 0.04 * (N - 60) / 12;
  return Math.max(0, Math.min(0.40, v));
}

function calc(p, serviceMode){
  const indef = isIndefinite();
  const months = termMonthsCount();
  const years = months/12;
  const nakupInfl = p.nakup*(1+GP.inflace);
  const prodejni  = nakupInfl*(1+GP.marze);             // prodejní cena stroje (bez jednorázových)
  const servisRok = p.sKo;                              // vždy KOMPLETNÍ servis (ze souboru)
  const sleva = currentSleva();
  // Základ pro výpočet pronájmu: vždy nákupní cena (případně inflačně upravená)
  const najemZaklad = nakupInfl;
  const isZx = !!(p.carrier);                            // Zentex má pole carrier, Bramidan ne
  // ----- VÝPOČET NÁJEMNÉHO -----
  // Bramidan: sazba 2,8 % × nákupní cena (fixní sazba), servis zvlášť
  // Zentex: fixní cena dle objemu — 20 m³ = 9 500 Kč VČETNĚ KOMPLETNÍHO SERVISU
  //         Interně rozděleno na nájem (= cena − servis) a servis, aby kalkulace fungovala
  let najemMesicBase, servisMesic;
  if(isZx){
    const celkemMesZx = zentexNajemDleObjemu(p.vol, najemZaklad); // celková cena vč. servisu
    servisMesic = servisRok / 12;
    najemMesicBase = Math.max(0, celkemMesZx - servisMesic);     // nájem stroje = celkem − servis
  } else {
    najemMesicBase = najemZaklad*GP.najemProc;
    servisMesic = servisRok / 12;
  }
  const najemMesic = najemMesicBase*(1-sleva);
  const najemProcEfektivni = najemZaklad > 0 ? (najemMesic + servisMesic) / najemZaklad : 0;   // celková efektivní sazba vč. servisu (pro Zentex relevantní)
  const najemRok = najemMesic*12;
  const celkemMesicVcServ = najemMesic + servisMesic;   // měsíční platba bez jednorázových (pro Zentex = 8 500/9 500/10 500 dle objemu)
  const celkemRokVcServ = najemRok + servisRok;
  const celkemObdobi = indef ? null : celkemRokVcServ*years;
  const items = oneTimeItems(p);
  const oneTimeTotal = items.reduce((s,it)=>s+it.amount,0);
  const withDph = v => Math.round(v*(1+GP.dph));

  // ----- LEASING (anuita) — jen pro Bramidan -----
  const leaseN = GP.leaseN;
  const leaseI = GP.leaseI;
  const fvFn = GP.leaseFVMode === 'old' ? residualPctOld : residualPct;
  const leaseFvPct = fvFn(leaseN);
  const leaseFV = nakupInfl * leaseFvPct;
  const leasePMT = bramidanPMT(nakupInfl, leaseN, leaseI, leaseFV);
  const leaseCelkemMesicVcServ = leasePMT + servisMesic;
  const leaseCelkemObdobi = leasePMT * leaseN + leaseFV;  // suma splátek + FV výkup
  const leaseSumServisu = servisMesic * leaseN;

  return {
    indef,nakupInfl,prodejni,months,years,najemZaklad,najemMesicBase,najemMesic,sleva,servisRok,servisMesic,najemRok,celkemMesicVcServ,celkemRokVcServ,celkemObdobi,oneTimeItemsList:items,oneTimeTotal,
    isZentex: isZx, najemProcEfektivni,                  // přidáno: pro UI Zentex se ukazuje efektivní sazba
    // ----- LEASING — anuita pro Bramidan -----
    leaseN, leaseI, leaseFvPct, leaseFV, leasePMT,
    leaseCelkemMesicVcServ, leaseCelkemObdobi, leaseSumServisu,
    leasePMTDph: withDph(leasePMT),
    leaseFVDph: withDph(leaseFV),
    leaseCelkemMesicVcServDph: withDph(leaseCelkemMesicVcServ),
    leaseCelkemObdobiDph: withDph(leaseCelkemObdobi),
    // ----- varianty s DPH (vždy spočítané ze stejných hodnot bez DPH × 1.21) -----
    dph: GP.dph,
    najemMesicDph: withDph(najemMesic),
    servisMesicDph: withDph(servisMesic),
    celkemMesicVcServDph: withDph(celkemMesicVcServ),
    celkemRokVcServDph: withDph(celkemRokVcServ),
    celkemObdobiDph: withDph(celkemObdobi),
    prodejniDph: withDph(prodejni),
    oneTimeTotalDph: withDph(oneTimeTotal),
    servisRokDph: withDph(servisRok)
  };
}
function najemZakladLabel(){ return 'nákupní'; }
function recommended(t){ return activeProducts().filter(p=>t>=p.minT && t<=p.maxT); }

/* ===== DOPORUČOVÁNÍ ZENTEX — fyzikální + bodový rating =====

   Logika:
   1. Z hmotnosti odpadu a hustoty materiálu spočítáme volný objem za měsíc.
   2. Z kompresního poměru lisu (závisí na síle 300/320/400 kN a materiálu) spočítáme
      lisovaný objem za měsíc.
   3. Pro každý kontejner spočítáme potřebnou frekvenci svozů (= lisovanyObjem / vol).
   4. Skóre 0–100 ze 5 metrik:
      - Sweet spot 20 m³ (25 b)     — ELKOPLAST preferuje 20 m³ jako optimum
      - Vhodnost velikosti (30 b)    — zda kontejner pokrývá frekvenci
      - Síla lisu vs. materiál (15 b) — XL pro těžký, std pro lehký
      - Frekvence svozů (20 b)       — méně svozů = lepší (úspora dopravy)
      - Cena (10 b)                  — nižší nákupní = lepší pro klienta
*/

function zentexCompressionRatio(material, force){
  const mat = MATERIAL_TYPES[material] || MATERIAL_TYPES['lepenkaPlast'];
  // Najdi nejbližší dostupný stupeň síly
  const keys = Object.keys(mat.compression).map(Number).sort((a,b)=>a-b);
  let key = keys[0];
  for(const k of keys) if(force >= k) key = k;
  return mat.compression[key] || 5;
}

function buildZentexCtx(){
  const mat = MATERIAL_TYPES[STATE.materialType] || MATERIAL_TYPES['lepenkaPlast'];
  const tonsMonth = STATE.tonsPerMonth;
  const kgMonth = tonsMonth * 1000;
  const volneObjem = kgMonth / mat.density;           // m³ volně sypaného materiálu za měsíc
  return {
    materialKey: STATE.materialType,
    materialName: mat.name,
    materialHeavy: mat.heavy,
    density: mat.density,
    tonsMonth,
    volneObjem,
    targetSvozy: STATE.svozyPerMonth,
    carrierType: STATE.carrierType
  };
}

function compactorRating(p, ctx){
  // 1. Kompresní poměr pro daný materiál a sílu lisu
  const compression = zentexCompressionRatio(ctx.materialKey, p.force);
  const lisovanyObjem = ctx.volneObjem / compression; // m³ lisovaného materiálu za měsíc

  // 2. Potřebná frekvence svozů pro tento kontejner (s 15 % rezervou)
  const efektivniVolKontejneru = p.vol * 0.85;
  const potrebnaFrekvence = lisovanyObjem / efektivniVolKontejneru;

  // 3. Skóre — 5 dílčích metrik
  const s = { sweetSpot: 0, velikost: 0, sila: 0, frekvence: 0, cena: 0 };

  // 3a) Sweet spot 20 m³ (25 b) — ELKOPLAST preferuje
  const sweetSpotMap = { 6: 5, 10: 12, 14: 18, 16: 22, 20: 25, 22: 22, 24: 20 };
  s.sweetSpot = sweetSpotMap[p.vol] || 10;

  // 3b) Velikost vs. potřeba (30 b) — kontejner musí stačit, ale ne moc velký
  const cyklusZaMesic = lisovanyObjem / efektivniVolKontejneru;
  if(cyklusZaMesic > 8)       s.velikost = 0;   // úplně nestačí, > 8 svozů/měs
  else if(cyklusZaMesic > 4)  s.velikost = 5;   // málo, ~5+ svozů/měs
  else if(cyklusZaMesic > 2)  s.velikost = 18;  // 2-4 svozy, ok ale ne ideál
  else if(cyklusZaMesic > 1)  s.velikost = 28;  // 1-2 svozy, vynikající
  else if(cyklusZaMesic > 0.5) s.velikost = 30; // < 1 svoz/měs, perfektní
  else                         s.velikost = 18; // < 0.5 svoz/měs - kontejner přebytkový

  // 3c) Síla lisu vs. materiál (15 b)
  if(ctx.materialHeavy && p.force >= 400)        s.sila = 15;
  else if(ctx.materialHeavy && p.force >= 320)   s.sila = 10;
  else if(ctx.materialHeavy && p.force >= 300)   s.sila = 6;
  else if(!ctx.materialHeavy && p.force >= 400)  s.sila = 12; // XL pro lehký = předimenzování
  else if(!ctx.materialHeavy && p.force >= 300)  s.sila = 15; // standard sedí

  // 3d) Frekvence svozů (20 b) — méně = lepší
  if(potrebnaFrekvence <= 0.5)      s.frekvence = 20;  // < 1× za 2 měs
  else if(potrebnaFrekvence <= 1)   s.frekvence = 18;  // 1× měsíčně - cíl klienta
  else if(potrebnaFrekvence <= 2)   s.frekvence = 13;
  else if(potrebnaFrekvence <= 3)   s.frekvence = 8;
  else if(potrebnaFrekvence <= 4)   s.frekvence = 3;
  else                              s.frekvence = 0;

  // 3e) Cena (10 b) — nižší nákupní cena = lepší pro klienta
  const minNakup = 330000, maxNakup = 450000;
  const cenaNorm = Math.max(0, Math.min(1, (maxNakup - p.nakup) / (maxNakup - minNakup)));
  s.cena = Math.round(10 * cenaNorm);

  s.total = s.sweetSpot + s.velikost + s.sila + s.frekvence + s.cena;

  return {
    score: s,
    metrics: {
      compression,
      lisovanyObjem,
      potrebnaFrekvence,
      mesicniDeficit: lisovanyObjem - efektivniVolKontejneru * (ctx.targetSvozy || 1)
    }
  };
}

/* Doporučí TOP N Zentex modelů podle skóre, filtruje primárně podle nosiče. */
function recommendedZentexScored(topN){
  const ctx = buildZentexCtx();
  const filtered = COMPACTORS.filter(p => p.carrier === ctx.carrierType);
  const scored = filtered.map(p => ({ p, ...compactorRating(p, ctx) }));
  scored.sort((a, b) => b.score.total - a.score.total);
  return scored.slice(0, topN || 5);
}


/* ---------- KATEGORIE PRODUKTU (Bramidan lisy / Zentex mobilní lisy) ---------- */
function isZentex(){ return STATE.product==='zentex'; }
function prodIsZentex(p){ return !!(p && p.carrier); }  // Zentex stroj má pole carrier, Bramidan ne
function activeProducts(){ return isZentex() ? COMPACTORS : PRESSES; }
function findProduct(id){ return activeProducts().find(p=>p.id===id) || PRESSES.find(p=>p.id===id) || COMPACTORS.find(p=>p.id===id); }

/* ---------- VÝBĚR LISŮ dle kritéria (množství / balík / otvor) ---------- */
function dimsVolume(s){ const m=String(s).replace(/\s/g,'').split('×').map(x=>parseFloat(x)||0); return (m[0]||0)*(m[1]||0)*(m[2]||0); }
function dimsArea(s){ const m=String(s).replace(/\s/g,'').split('×').map(x=>parseFloat(x)||0); return (m[0]||0)*(m[1]||0); }
function uniqueBales(){ return [...new Set(PRESSES.map(p=>p.bale))].sort((a,b)=>dimsVolume(a)-dimsVolume(b)); }
function uniqueFeeds(){ return [...new Set(PRESSES.map(p=>p.feed))].sort((a,b)=>dimsArea(a)-dimsArea(b)); }
function uniqueVols(){ return [...new Set(COMPACTORS.map(p=>p.vol))].sort((a,b)=>a-b); }
function uniqueCarriers(){ return [...new Set(COMPACTORS.map(p=>p.carrier))]; }
function selectedPresses(){
  if(isZentex()){
    if(STATE.selectMode==='vol')     return STATE.volChoice ? COMPACTORS.filter(p=>String(p.vol)===String(STATE.volChoice)) : [];
    if(STATE.selectMode==='carrier') return STATE.carrierChoice ? COMPACTORS.filter(p=>p.carrier===STATE.carrierChoice) : [];
    // Default: top 5 podle skóre (rating)
    return recommendedZentexScored(5).map(s => s.p);
  }
  if(STATE.selectMode==='bale')  return STATE.baleChoice ? PRESSES.filter(p=>p.bale===STATE.baleChoice) : [];
  if(STATE.selectMode==='feed')  return STATE.feedChoice ? PRESSES.filter(p=>p.feed===STATE.feedChoice) : [];
  return recommended(STATE.tonsPerMonth);
}
function selectionLabel(){
  if(isZentex()){
    if(STATE.selectMode==='vol')     return STATE.volChoice ? 'objem '+STATE.volChoice+' m³' : 'objem (nevybráno)';
    if(STATE.selectMode==='carrier') return STATE.carrierChoice ? STATE.carrierChoice+' nosič' : 'typ nosiče (nevybráno)';
    return STATE.tonsPerMonth.toLocaleString('cs-CZ')+' t/měs';
  }
  if(STATE.selectMode==='bale') return STATE.baleChoice ? 'velikost balíku '+STATE.baleChoice+' mm' : 'velikost balíku (nevybráno)';
  if(STATE.selectMode==='feed') return STATE.feedChoice ? 'plnicí otvor '+STATE.feedChoice+' mm' : 'plnicí otvor (nevybráno)';
  return STATE.tonsPerMonth.toLocaleString('cs-CZ')+' t/měs';
}
function isSale(){ return STATE.mode==='sale'; }
function isLease(){ return STATE.mode==='lease'; }
function isRent(){ return STATE.mode==='rent'; }
function modeLabel(){ return isSale()?'Prodej':isLease()?'Leasing':'Pronájem'; }

    </defs>

    <!-- hlava -->

    <rect x="${bx+14}" y="${by+36}" width="12" height="2.5" rx="1.25" fill="${steel}"/>

/* =====================================================================
   OFFLINE XLSX GENERÁTOR — bez externí knihovny.
   Vytvoří skutečný .xlsx (ZIP "store" + minimální OOXML + styly).
   ===================================================================== */
const XLSX_MINI = (function(){
  // CRC32
  const crcTable=(()=>{const t=[];for(let n=0;n<256;n++){let c=n;for(let k=0;k<8;k++)c=c&1?0xEDB88320^(c>>>1):c>>>1;t[n]=c>>>0;}return t;})();
  function crc32(bytes){let c=0xFFFFFFFF;for(let i=0;i<bytes.length;i++)c=crcTable[(c^bytes[i])&0xFF]^(c>>>8);return (c^0xFFFFFFFF)>>>0;}
  const enc=new TextEncoder();
  function strBytes(s){return enc.encode(s);}
  // sloupec index -> písmeno (1->A)
  function colName(n){let s='';while(n>0){const m=(n-1)%26;s=String.fromCharCode(65+m)+s;n=Math.floor((n-1)/26);}return s;}
  function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

  // sheet z 2D pole {v,t,s}: v=hodnota, t='n'|'s', s=styl index
  function sheetXML(rows){
    let body='';
    rows.forEach((row,ri)=>{
      let cells='';
      row.forEach((cell,ci)=>{
        if(cell==null||cell.v==null||cell.v==='') { return; }
        const ref=colName(ci+1)+(ri+1);
        const s=cell.s?` s="${cell.s}"`:'';
        if(cell.t==='n') cells+=`<c r="${ref}"${s} t="n"><v>${cell.v}</v></c>`;
        else cells+=`<c r="${ref}"${s} t="inlineStr"><is><t xml:space="preserve">${esc(cell.v)}</t></is></c>`;
      });
      body+=`<row r="${ri+1}">${cells}</row>`;
    });
    return `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<worksheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main"><sheetData>${body}</sheetData></worksheet>`;
  }

  // styly: 0=normal,1=bold,2=měna(#,##0 "Kč"),3=bold+žlutý fill (header),4=bold+měna,5=title
  const stylesXML=`<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<styleSheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main">
<numFmts count="1"><numFmt numFmtId="164" formatCode="#,##0\\ &quot;Kč&quot;"/></numFmts>

</fonts>
<fills count="4">
<fill><patternFill patternType="none"/></fill>
<fill><patternFill patternType="gray125"/></fill>
<fill><patternFill patternType="solid"><fgColor rgb="FFFFCE1F"/></patternFill></fill>
<fill><patternFill patternType="solid"><fgColor rgb="FF2B3440"/></patternFill></fill>
</fills>
<borders count="2">
<border><left/><right/><top/><bottom/><diagonal/></border>
<border><left/><right/><top/><bottom style="thin"><color rgb="FFD0D0D0"/></bottom><diagonal/></border>
</borders>
<cellStyleXfs count="1"><xf numFmtId="0" fontId="0" fillId="0" borderId="0"/></cellStyleXfs>
<cellXfs count="7">
<xf numFmtId="0" fontId="0" fillId="0" borderId="0" xfId="0"/>
<xf numFmtId="0" fontId="1" fillId="0" borderId="0" xfId="0" applyFont="1"/>
<xf numFmtId="164" fontId="0" fillId="0" borderId="1" xfId="0" applyNumberFormat="1" applyBorder="1"/>
<xf numFmtId="0" fontId="2" fillId="2" borderId="0" xfId="0" applyFont="1" applyFill="1"/>
<xf numFmtId="164" fontId="1" fillId="0" borderId="1" xfId="0" applyNumberFormat="1" applyFont="1" applyBorder="1"/>
<xf numFmtId="0" fontId="3" fillId="0" borderId="0" xfId="0" applyFont="1"/>
<xf numFmtId="0" fontId="0" fillId="0" borderId="1" xfId="0" applyBorder="1"/>
</cellXfs>
<cellStyles count="1"><cellStyle name="Normal" xfId="0" builtinId="0"/></cellStyles>
</styleSheet>`;

  // sestavení .xlsx (více listů)
  function build(sheets){ // sheets=[{name,rows}]
    const files=[];
    const add=(name,content)=>files.push({name,bytes:strBytes(content)});

    add('[Content_Types].xml',`<?xml version="1.0" encoding="UTF-8" standalone="yes"?>

<Default Extension="xml" ContentType="application/xml"/>
<Override PartName="/xl/workbook.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet.main+xml"/>
<Override PartName="/xl/styles.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.styles+xml"/>
${sheets.map((s,i)=>`<Override PartName="/xl/worksheets/sheet${i+1}.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.worksheet+xml"/>`).join('')}
</Types>`);
    add('_rels/.rels',`<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">
<Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="xl/workbook.xml"/>
</Relationships>`);
    add('xl/workbook.xml',`<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<workbook xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships">
<sheets>${sheets.map((s,i)=>`<sheet name="${esc(s.name)}" sheetId="${i+1}" r:id="rId${i+1}"/>`).join('')}</sheets></workbook>`);
    add('xl/_rels/workbook.xml.rels',`<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">
${sheets.map((s,i)=>`<Relationship Id="rId${i+1}" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/worksheet" Target="worksheets/sheet${i+1}.xml"/>`).join('')}
<Relationship Id="rId${sheets.length+1}" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/styles" Target="styles.xml"/>
</Relationships>`);
    add('xl/styles.xml',stylesXML);
    sheets.forEach((s,i)=>add(`xl/worksheets/sheet${i+1}.xml`,sheetXML(s.rows)));

    // ZIP (store, bez komprese)
    const chunks=[]; const central=[]; let offset=0;
    function u16(n){return [n&0xFF,(n>>8)&0xFF];}
    function u32(n){return [n&0xFF,(n>>8)&0xFF,(n>>16)&0xFF,(n>>24)&0xFF];}
    files.forEach(f=>{
      const nameB=strBytes(f.name); const data=f.bytes; const crc=crc32(data);
      const local=[].concat(u32(0x04034b50),u16(20),u16(0),u16(0),u16(0),u16(0),u32(crc),u32(data.length),u32(data.length),u16(nameB.length),u16(0));
      chunks.push(new Uint8Array(local)); chunks.push(nameB); chunks.push(data);
      const cen=[].concat(u32(0x02014b50),u16(20),u16(20),u16(0),u16(0),u16(0),u16(0),u32(crc),u32(data.length),u32(data.length),u16(nameB.length),u16(0),u16(0),u16(0),u16(0),u32(0),u32(offset));
      central.push({head:new Uint8Array(cen),name:nameB});
      offset+=local.length+nameB.length+data.length;
    });
    const cdStart=offset; let cdSize=0;
    central.forEach(c=>{chunks.push(c.head);chunks.push(c.name);cdSize+=c.head.length+c.name.length;});
    const end=[].concat(u32(0x06054b50),u16(0),u16(0),u16(files.length),u16(files.length),u32(cdSize),u32(cdStart),u16(0));
    chunks.push(new Uint8Array(end));
    let total=0;chunks.forEach(c=>total+=c.length);
    const out=new Uint8Array(total);let pos=0;chunks.forEach(c=>{out.set(c,pos);pos+=c.length;});
    return new Blob([out],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
  }
  // helpers pro buňky
  const C={ t:v=>({v,t:'s',s:5}), h:v=>({v,t:'s',s:3}), b:v=>({v,t:'s',s:1}), s:v=>({v,t:'s',s:0}),
            n:v=>({v,t:'n',s:0}), money:v=>({v,t:'n',s:2}), moneyB:v=>({v,t:'n',s:4}), sb:v=>({v,t:'s',s:6}) };
  return {build,C};
})();

function selectControlHTML(){

    const opts=uniqueVols().map(v=>`<option value="${v}" ${String(STATE.volChoice)===String(v)?'selected':''}>${v} m³</option>`).join('');
    return `<select class="tinp sel-big" id="volSelect"><option value="">— vyberte objem kontejneru —</option>${opts}</select>
      <p class="sel-hint">Vyberte objem lisovacího kontejneru. Zobrazí se stroje s touto kapacitou napříč řadami.</p>`;
  }
  if(STATE.selectMode==='carrier'){
    const opts=uniqueCarriers().map(c=>`<option value="${c}" ${STATE.carrierChoice===c?'selected':''}>${c}</option>`).join('');
    return `<select class="tinp sel-big" id="carrierSelect"><option value="">— vyberte typ nosiče —</option>${opts}</select>
      <p class="sel-hint">Řetězový (Z) pro řetězové nosiče, hákový (R) pro hákové vozy. Zobrazí se odpovídající stroje.</p>`;
  }
  if(STATE.selectMode==='bale'){
    const opts=uniqueBales().map(b=>`<option value="${b}" ${STATE.baleChoice===b?'selected':''}>${b} mm</option>`).join('');
    return `<select class="tinp sel-big" id="baleSelect"><option value="">— vyberte velikost balíku (Š×H×V) —</option>${opts}</select>
      <p class="sel-hint">Vyberte požadovanou velikost hotového balíku. Zobrazí se lisy, které takový balík vyrábějí.</p>`;
  }
  if(STATE.selectMode==='feed'){
    const opts=uniqueFeeds().map(f=>`<option value="${f}" ${STATE.feedChoice===f?'selected':''}>${f} mm</option>`).join('');
    return `<select class="tinp sel-big" id="feedSelect"><option value="">— vyberte plnicí otvor (Š×V) —</option>${opts}</select>
      <p class="sel-hint">Vyberte velikost plnicího otvoru podle toho, co bude klient vkládat. Zobrazí se lisy s tímto otvorem.</p>`;
  }

function termControlHTML(){

    return `<div style="padding:6px 0">

    </div>`;

      <input type="range" id="termRange" min="1" max="11" step="1" value="${STATE.months}">
      <div class="range-scale"><span>1 měsíc</span><span>6 měsíců</span><span>11 měsíců</span></div>`;

function discHTML(sl){
  if(STATE.termMode!=='years'){
    return I.tag+`Sleva za závazek ${GP.slevaOd}–${GP.slevaDo} let (${pct(GP.slevaMin)}–${pct(GP.slevaMax)}). Neplatí pro ${STATE.termMode==='months'?'měsíční pronájem':'dobu neurčitou'}.`;
  }
  if(sl>0){
    const max=STATE.years>=GP.slevaDo;
    return I.check+`Sleva za závazek aktivní: −${pct(sl)} z pronájmu${max?' (maximum)':' ('+STATE.years+' '+rokyWord(STATE.years)+')'}. Škála: ${pct(GP.slevaMin)} při ${GP.slevaOd} letech → ${pct(GP.slevaMax)} při ${GP.slevaDo} letech.`;
  }
  return I.tag+`Sleva za závazek od ${GP.slevaOd} let: ${pct(GP.slevaMin)}–${pct(GP.slevaMax)} (škáluje do ${GP.slevaDo} let). Zatím neaktivní.`;
}

function bindTabs(){
  document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>switchTab(b.dataset.t));
}
function switchTab(t){
  STATE.activeTab=t;
  document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.dataset.t===t));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  const map={inbox:function(){if(typeof renderInbox==='function')renderInbox();},compare:renderCompare,table:renderTable,params:renderParams,offer:renderOffer,history:renderHistory,contract:renderContract,lease:renderLease,roi:renderROI,docs:renderDocs,manual:renderManual};
  document.getElementById('panel-'+t).classList.add('active');
  map[t]();
  updateCounts();
}
function updateCounts(){
  const rec=selectedPresses().length;
  const cc=document.getElementById('cntCompare'); if(cc)cc.textContent=rec;
  const co=document.getElementById('cntOffer'); if(co)co.textContent=STATE.selectedForOffer.length;
  const ch=document.getElementById('cntHistory'); if(ch)ch.textContent=History.all().length;
  const ci=document.getElementById('cntInbox'); if(ci)ci.textContent=(typeof _inboxNewCount==='number'?_inboxNewCount:0);

/* ---------- HERO BINDINGS ---------- */
function bindHero(){
  // produktová řada: Bramidan / Zentex
  const ps=document.getElementById('prodSeg');
  if(ps) ps.querySelectorAll('button').forEach(b=>b.onclick=()=>{
    if(STATE.product===b.dataset.p) return;
    STATE.product=b.dataset.p;
    STATE.selectMode='tons';          // reset kritéria (liší se dle řady)
    render();                          // výběr do nabídky se ZACHOVÁ — řady lze kombinovat
  });
  // forma: pronájem / prodej
  document.getElementById('modeSeg').querySelectorAll('button').forEach(b=>b.onclick=()=>{
    STATE.mode=b.dataset.m; render(); // překreslí hero (změní se ovladače)
  });
  // kritérium výběru
  document.getElementById('selSeg').querySelectorAll('button').forEach(b=>b.onclick=()=>{
    STATE.selectMode=b.dataset.sm;
    document.querySelectorAll('#selSeg button').forEach(x=>x.classList.toggle('on',x===b));
    document.getElementById('selCtrl').innerHTML=selectControlHTML();
    bindSelectControl();
    refreshHeroDynamic(); refreshActivePanel();
  });
  bindSelectControl();
  // marže (jen v režimu prodej)
  const mr=document.getElementById('marzeRange');
  if(mr) mr.oninput=()=>{ GP.marze=parseInt(mr.value)/100; document.getElementById('marzeVal').textContent=mr.value; refreshHeroDynamic(); refreshActivePanel(); };
  // doba (jen v režimu pronájem)
  bindTermControl();
  const termSeg=document.getElementById('termSeg');
  if(termSeg) termSeg.querySelectorAll('button').forEach(b=>b.onclick=()=>{
    STATE.termMode=b.dataset.tm;
    document.querySelectorAll('#termSeg button').forEach(x=>x.classList.toggle('on',x===b));
    document.getElementById('termCtrl').innerHTML=termControlHTML();
    bindTermControl();
    refreshHeroDynamic(); refreshActivePanel();
  });
  const rh=document.getElementById('rateHelp');
  if(rh) rh.onclick=()=>openPricingExplainModal();
  // ----- ZENTEX SPECIFICKÉ OVLÁDAČE -----
  // Vozový park (Hákový / Řetězový)
  const carSeg = document.getElementById('carrierSeg');
  if(carSeg) carSeg.querySelectorAll('button').forEach(b=>b.onclick=()=>{
    STATE.carrierType = b.dataset.c;
    carSeg.querySelectorAll('button').forEach(x=>x.classList.toggle('on', x===b));
    refreshHeroDynamic(); refreshActivePanel();
  });
  // Druh odpadu
  const matSel = document.getElementById('materialSelect');
  if(matSel) matSel.onchange = ()=>{
    STATE.materialType = matSel.value;
    render(); // přerendruje hint o materiálu
  };
  // Frekvence svozů
  const svRange = document.getElementById('svozyRange');
  if(svRange) svRange.oninput = ()=>{
    STATE.svozyPerMonth = parseInt(svRange.value);
    const v = document.getElementById('svozyVal');
    if(v) v.textContent = STATE.svozyPerMonth;
    refreshHeroDynamic(); refreshActivePanel();
  };
  // ----- KONEC ZENTEX SPECIFIK -----

  ['clCompany','clName','clWaste','clContact'].forEach(id=>{
    const el=document.getElementById(id); if(!el)return;
    el.oninput=()=>{ const k={clCompany:'company',clName:'name',clWaste:'waste',clContact:'contact'}[id]; STATE.client[k]=el.value; if(STATE.activeTab==='offer')renderOffer(); };
  });
}
function bindSelectControl(){
  const tr=document.getElementById('tonsRange');
  if(tr) tr.oninput=()=>{ STATE.tonsPerMonth=parseFloat(tr.value); const v=document.getElementById('tonsVal'); if(v)v.textContent=STATE.tonsPerMonth.toLocaleString('cs-CZ'); refreshHeroDynamic(); refreshActivePanel(); };
  const bs=document.getElementById('baleSelect');
  if(bs) bs.onchange=()=>{ STATE.baleChoice=bs.value; refreshHeroDynamic(); refreshActivePanel(); };
  const fs=document.getElementById('feedSelect');
  if(fs) fs.onchange=()=>{ STATE.feedChoice=fs.value; refreshHeroDynamic(); refreshActivePanel(); };
  const vs=document.getElementById('volSelect');
  if(vs) vs.onchange=()=>{ STATE.volChoice=vs.value; refreshHeroDynamic(); refreshActivePanel(); };

  if(cs) cs.onchange=()=>{ STATE.carrierChoice=cs.value; refreshHeroDynamic(); refreshActivePanel(); };
}
function bindTermControl(){
  const r=document.getElementById('termRange'); if(!r)return;
  r.oninput=()=>{
    const v=parseInt(r.value);
    if(STATE.termMode==='months'){ STATE.months=v; const u=document.querySelector('#termCtrl .u'); if(u)u.textContent=mesicWord(v); }
    else { STATE.years=v; const u=document.querySelector('#termCtrl .u'); if(u)u.textContent=rokyWord(v); }
    const vv=document.getElementById('termVal'); if(vv)vv.textContent=v;
    refreshHeroDynamic(); refreshActivePanel();
  };
}
function refreshHeroDynamic(){
  const recs=selectedPresses();
  const recEl=document.querySelector('.reco .rv span'); if(recEl)recEl.textContent=recs.map(r=>r.id).join(", ")||"—";
  const rlEl=document.querySelector('.reco .rl'); if(rlEl)rlEl.textContent=`${isSale()?'Lisy k prodeji':'Doporučené lisy'} — ${selectionLabel()}`;
  const rdEl=document.querySelector('.reco .rd'); if(rdEl)rdEl.innerHTML=`${recs.length} ${recs.length===1?'vhodný model':'vhodných modelů'} dle kritéria.`;
  const disc=document.getElementById('discBadge');
  if(disc && !isSale()){ const sl=currentSleva(); disc.className='disc '+(sl>0?'':'off'); disc.innerHTML=discHTML(sl); }
  updateCounts();
}
function refreshActivePanel(){
  const map={compare:renderCompare,table:renderTable,params:null,offer:renderOffer,history:renderHistory,contract:renderContract,lease:renderLease,roi:renderROI,docs:null,manual:null};

}

function renderCompare(){
  const el=document.getElementById('panel-compare');
  const recs=selectedPresses();
  if(!recs.length){
    const msg = STATE.selectMode==='bale' ? 'Vyberte velikost balíku v konfiguraci nahoře.'
      : STATE.selectMode==='feed' ? 'Vyberte velikost plnicího otvoru v konfiguraci nahoře.'
      : STATE.selectMode==='vol' ? 'Vyberte objem kontejneru v konfiguraci nahoře.'
      : STATE.selectMode==='carrier' ? 'Vyberte typ nosiče v konfiguraci nahoře.'
      : 'Pro toto množství není v katalogu vhodný model. Upravte kritérium výběru.';
    el.innerHTML=`<div class="empty-offer">${I.cube}<h3>Žádný ${isZentex()?'stroj':'lis'} k zobrazení</h3><p>${msg}</p></div>`; return;
  }
  const sale=isSale();
  const calcs=recs.map(p=>({p,c:calc(p,STATE.serviceMode)}));
  // nejvýhodnější = nejnižší prodejní cena (prodej) / nejnižší měsíční (pronájem)
  const lease=isLease(); const priceKey = sale?'prodejni':(lease?'leaseCelkemMesicVcServ':'celkemMesicVcServ'); const minIdx=calcs.reduce((mi,o,i,a)=>o.c[priceKey]<a[mi].c[priceKey]?i:mi,0);
  el.innerHTML=`<div class="grid-presses">${calcs.map((o,i)=>pressCard(o.p,o.c,i===minIdx)).join('')}</div>`;
  el.querySelectorAll('[data-add]').forEach(b=>b.onclick=()=>toggleOffer(b.dataset.add));
}

/* ---------- CSV EXPORT / IMPORT CENÍKU ---------- */
function csvEscape(v){
  const s=String(v==null?'':v);
  return /[;"\n\r]/.test(s) ? '"'+s.replace(/"/g,'""')+'"' : s;
}
function exportPriceCSV(){
  const SEP=';';
  const BOM='\uFEFF';
  const head=['Kategorie','Model','Kód','EUR (info)','Nákupní cena Kč','Doprava Kč','Servis elektro Kč','Servis bezp. Kč','Kompletní servis Kč','Min t/měs','Max t/měs','Olej (L)'];
  const lines=[head.map(csvEscape).join(SEP)];
  PRESSES.forEach(p=>lines.push(['Bramidan',p.id,'','',p.nakup,p.doprava,p.sEl,p.sBz,p.sKo,p.minT,p.maxT,p.oil||''].map(csvEscape).join(SEP)));
  COMPACTORS.forEach(p=>lines.push(['Zentex',p.id,p.code||'',p.eur||'',p.nakup,p.doprava,p.sEl,p.sBz,p.sKo,p.minT,p.maxT,p.oil||''].map(csvEscape).join(SEP)));
  const csv=BOM+lines.join('\r\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='cenik-elkoplast-'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();
  toast('CSV vyexportováno ('+(PRESSES.length+COMPACTORS.length)+' strojů)');
}
function parseCSVLine(line, sep){
  // Robustní parser CSV řádku s podporou uvozovek
  const out=[]; let cur=''; let inQ=false;
  for(let i=0;i<line.length;i++){
    const ch=line[i];
    if(inQ){
      if(ch==='"' && line[i+1]==='"'){cur+='"';i++;}
      else if(ch==='"'){inQ=false;}
      else cur+=ch;
    } else {
      if(ch==='"')inQ=true;
      else if(ch===sep){out.push(cur);cur='';}
      else cur+=ch;
    }
  }
  out.push(cur);
  return out;
}
function importPriceCSV(){
  const inp=document.createElement('input');
  inp.type='file'; inp.accept='.csv,text/csv';
  inp.onchange=()=>{
    const file=inp.files[0]; if(!file) return;
    const r=new FileReader();
    r.onload=()=>{
      try{
        let txt=String(r.result);
        if(txt.charCodeAt(0)===0xFEFF) txt=txt.slice(1);
        const lines=txt.split(/\r?\n/).filter(l=>l.trim());
        if(lines.length<2) return toast('CSV je prázdné nebo neobsahuje data');
        const sep = lines[0].indexOf(';')>=0 ? ';' : ',';
        const cols = parseCSVLine(lines[0], sep).map(s=>s.trim().toLowerCase());
        const idx = needle => cols.findIndex(c=>c.includes(needle));
        const iCat=idx('kateg'), iModel=idx('model');
        const iNakup=cols.findIndex(c=>c.includes('nákup')||c.includes('nakup'));
        const iDoprava=idx('doprav');
        const iSEl=idx('elektro'), iSBz=idx('bezp'), iSKo=idx('komplet');
        const iMinT=cols.findIndex(c=>/min.*t.*m/.test(c));
        const iMaxT=cols.findIndex(c=>/max.*t.*m/.test(c));
        const iOil=idx('olej');
        if(iModel<0) return toast('CSV chybí sloupec "Model"');
        const num=s=>{const n=parseFloat(String(s||'').replace(/\s/g,'').replace(',','.'));return isFinite(n)?n:0;};
        let updated=0, skipped=0;
        for(let li=1;li<lines.length;li++){
          const v=parseCSVLine(lines[li], sep).map(s=>s.trim());
          const model=v[iModel]; if(!model){skipped++;continue;}
          const p = PRESSES.find(x=>x.id===model) || COMPACTORS.find(x=>x.id===model);
          if(!p){skipped++;continue;}
          if(iNakup>=0 && v[iNakup]!=='') p.nakup=num(v[iNakup]);
          if(iDoprava>=0 && v[iDoprava]!=='') p.doprava=num(v[iDoprava]);
          if(iSEl>=0 && v[iSEl]!=='') p.sEl=num(v[iSEl]);
          if(iSBz>=0 && v[iSBz]!=='') p.sBz=num(v[iSBz]);
          if(iSKo>=0 && v[iSKo]!=='') p.sKo=num(v[iSKo]);
          if(iMinT>=0 && v[iMinT]!=='') p.minT=num(v[iMinT]);
          if(iMaxT>=0 && v[iMaxT]!=='') p.maxT=num(v[iMaxT]);
          if(iOil>=0 && v[iOil]!=='') p.oil=num(v[iOil]);
          updated++;
        }
        renderParams();
        refreshHeroDynamic();
        toast('CSV importováno: aktualizováno '+updated+' strojů'+(skipped?', přeskočeno '+skipped:''));
      }catch(e){
        console.error(e);
        toast('Chyba importu CSV: '+(e.message||e));
      }
    };
    r.readAsText(file,'utf-8');
  };
  inp.click();
}

    const field=document.getElementById('buField').value;

    if(range==='both'||range==='zentex') lists.push(COMPACTORS);
    let count=0;
    lists.forEach(lst=>lst.forEach(p=>{

      let next=cur;

      else if(op==='abs') next=cur+val;
      else if(op==='mul') next=cur*val;
      p[field]=Math.max(0, Math.round(next));

    }));
    close();
    renderParams();
    refreshHeroDynamic();
    toast('Hromadně upraveno: '+count+' strojů');

/* ---------- HISTORIE: vytvoření snapshotu a načtení ---------- */
function saveToHistory(via){
  const sel=STATE.selectedForOffer.map(id=>findProduct(id)).filter(Boolean);
  if(!sel.length) return null;
  const sale=isSale(), prof=Profiles.active();
  let sumMonth=0,sumPeriod=0,sumSale=0,sumOne=0;
  const items=sel.map(p=>{
    const c=calc(p,STATE.serviceMode);
    sumMonth+=c.celkemMesicVcServ; sumPeriod+=(c.indef?c.celkemRokVcServ:c.celkemObdobi||0);
    sumSale+=c.prodejni; sumOne+=c.oneTimeTotal;
    return {id:p.id, mesic:Math.round(c.celkemMesicVcServ), prodejni:Math.round(c.prodejni), oneTime:Math.round(c.oneTimeTotal)};
  });
  // dedup: pokud poslední záznam je shodný (stejný klient+stroje+forma), neukládat znovu
  const sig=JSON.stringify({c:STATE.client.company,m:STATE.mode,p:STATE.product,ids:items.map(i=>i.id),t:termLabel(),mz:GP.marze});
  const last=History.all()[0];
  if(last && last.sig===sig){ return last; }
  const entry={
    sig, via, date:new Date().toLocaleString('cs-CZ'),
    product:STATE.product, productLabel:isZentex()?'Zentex':'Bramidan',
    mode:STATE.mode, modeLabel:sale?'Prodej':'Pronájem',
    term:termLabel(), marze:GP.marze, najemProc:GP.najemProc,
    selectMode:STATE.selectMode, tons:STATE.tonsPerMonth,
    client:{...STATE.client},
    seller: prof?{name:prof.name,email:prof.email,phone:prof.phone}:null,
    items,
    sumMonth:Math.round(sumMonth), sumPeriod:Math.round(sumPeriod),
    sumSale:Math.round(sumSale), sumOne:Math.round(sumOne)
  };
  History.add(entry, 'offer').then(()=>updateCounts());
  return entry;
}
function loadFromHistory(id){
  const e=History.get(id); if(!e) return;
  STATE.product=e.product||'bramidan';
  STATE.mode=e.mode||'rent';
  STATE.selectMode='tons';
  if(typeof e.tons==='number') STATE.tonsPerMonth=e.tons;
  if(typeof e.marze==='number') GP.marze=e.marze;
  STATE.client={...STATE.client, ...(e.client||{})};
  STATE.selectedForOffer=(e.items||[]).map(i=>i.id).filter(id=>findProduct(id));
  STATE.activeTab='offer';
  render();
  toast('Nabídka načtena z historie');
}

}

    <div class="note-box">${I.info}<span>${sale?'Kupní':'Nájemní'} smlouva se generuje dle vzoru ELKOPLAST CZ. Údaje níže doplňte <b>před stažením</b>. Pole, která zůstanou prázdná, budou ve smlouvě jako tečky k ručnímu doplnění před podpisem.</span></div>

    <div class="sec-title">Doplňující údaje pro smlouvu</div>
    <div class="contract-grid">
      <div class="cf"><label>IČO klienta</label><input type="text" data-cf="ico" value="${esc(cl.ico||'')}" placeholder="12345678"></div>
      <div class="cf"><label>DIČ klienta (volitelné)</label><input type="text" data-cf="dic" value="${esc(cl.dic||'')}" placeholder="CZ12345678"></div>
      <div class="cf cf-wide"><label>Sídlo klienta (ulice, PSČ, město)</label><input type="text" data-cf="sidlo" value="${esc(cl.sidlo||'')}" placeholder="Ulice 123, 760 01 Zlín"></div>
      <div class="cf cf-wide"><label>Fakturační e-mail</label><input type="email" data-cf="fakturEmail" value="${esc(cl.fakturEmail||'')}" placeholder="faktury@klient.cz"></div>
      <div class="cf cf-wide"><label>Místo plnění / ${sale?'dodání':'instalace'}</label><input type="text" data-cf="mistoPlneni" value="${esc(cl.mistoPlneni||'')}" placeholder="Ulice 456, 760 01 Zlín"></div>
      <div class="cf"><label>${sale?'Datum dodání':'Datum počátku nájmu'}</label><input type="text" data-cf="datumPocatku" value="${esc(cl.datumPocatku||'')}" placeholder="1.7.2026"></div>
      ${sale?'':`<div class="cf"><label>Výpovědní lhůta</label><input type="text" data-cf="vypovedniLhuta" value="${esc(cl.vypovedniLhuta||'2 měsíce')}"></div>`}
      ${sale?`<div class="cf"><label>Záruční doba (měsíce)</label><input type="text" data-cf="zaruka" value="${esc(cl.zaruka||'24 měsíců')}" placeholder="24 měsíců"></div>`:''}
    </div>

    <div class="sec-title" style="margin-top:18px">Výrobní čísla strojů (volitelné — doplní se do specifikace)</div>
    <div class="contract-grid">
      ${sel.map(p=>{
        const pz=prodIsZentex(p);
        const lbl=(pz?'Zentex ':'Bramidan ')+p.id;
        const sn=cl.serialNumbers && cl.serialNumbers[p.id] || '';
        const yr=cl.yearsMade && cl.yearsMade[p.id] || '';
        return `
        <div class="cf"><label>${esc(lbl)} — výrobní číslo</label><input type="text" data-sn="${esc(p.id)}" value="${esc(sn)}" placeholder="např. ZX-2026-12345"></div>
        <div class="cf"><label>${esc(lbl)} — rok výroby</label><input type="text" data-yr="${esc(p.id)}" value="${esc(yr)}" placeholder="2026"></div>`;
      }).join('')}
    </div>

    ${sale?'':`
    <div class="sec-title" style="margin-top:18px">Zkušební doba (volitelná)</div>
    <div class="contract-grid">
      <div class="cf cf-wide">
        <label style="display:flex;align-items:center;gap:10px;cursor:pointer;font-weight:600">
          <input type="checkbox" id="trialPeriodCb" ${cl.trialPeriod?'checked':''} style="width:18px;height:18px;cursor:pointer">
          <span>Zařadit do smlouvy <b>zkušební dobu 5 týdnů</b> (první 4 týdny zdarma, vyhodnocení po 4 týdnech)</span>
        </label>
        <div style="margin-top:8px;font-size:12px;color:var(--muted);padding-left:28px">
          Po dobu prvních 4 týdnů od předání předmětu nájmu klient neplatí nájemné ani servisní složku. V 5. týdnu probíhá společné vyhodnocení — pokud klient pokračuje, smlouva přejde do standardního režimu (nájem za sjednanou měsíční sazbu od 6. týdne). Pokud nepokračuje, předmět nájmu se v 5. týdnu vrací bez sankce, klient hradí pouze dopravu a uvedení do provozu.
        </div>
      </div>
    </div>
    `}

    <div class="offer-bar" style="margin-top:18px">
      <span class="lbl">${sale?'Kupní':'Nájemní'} smlouva — ${sel.map(p=>(prodIsZentex(p)?'Zentex ':'Bramidan ')+p.id).join(' + ')}</span>
      <div style="margin-left:auto;display:flex;gap:9px">
        <button class="btn" id="contractDocxBtn">${I.doc} Stáhnout Word (.doc)</button>
        <button class="btn gold" id="contractPrintBtn">${I.print} PDF / Tisk</button>
      </div>
    </div>

    <div id="contractDoc" class="contract-doc">${generateContractHTML(sel)}</div>
  `;

  // Handler pro výrobní čísla
  el.querySelectorAll('[data-sn]').forEach(inp=>{
    inp.oninput=()=>{
      if(!STATE.client.serialNumbers) STATE.client.serialNumbers={};
      STATE.client.serialNumbers[inp.dataset.sn]=inp.value;
      const doc=document.getElementById('contractDoc');
      const selNow=STATE.selectedForOffer.map(id=>findProduct(id)).filter(Boolean);
      if(doc) doc.innerHTML=generateContractHTML(selNow);
    };
  });
  // Handler pro roky výroby
  el.querySelectorAll('[data-yr]').forEach(inp=>{
    inp.oninput=()=>{
      if(!STATE.client.yearsMade) STATE.client.yearsMade={};
      STATE.client.yearsMade[inp.dataset.yr]=inp.value;
      const doc=document.getElementById('contractDoc');
      const selNow=STATE.selectedForOffer.map(id=>findProduct(id)).filter(Boolean);
      if(doc) doc.innerHTML=generateContractHTML(selNow);
    };
  });
  // Handler pro zkušební dobu
  const trialCb=document.getElementById('trialPeriodCb');
  if(trialCb){
    trialCb.onchange=()=>{
      STATE.client.trialPeriod=trialCb.checked;
      const doc=document.getElementById('contractDoc');
      const selNow=STATE.selectedForOffer.map(id=>findProduct(id)).filter(Boolean);
      if(doc) doc.innerHTML=generateContractHTML(selNow);
    };
  }

  el.querySelectorAll('[data-cf]').forEach(inp=>{
    inp.oninput=()=>{
      STATE.client[inp.dataset.cf]=inp.value;
      const doc=document.getElementById('contractDoc');
      if(doc) doc.innerHTML=generateContractHTML(sel);
    };
  });
  document.getElementById('contractPrintBtn').onclick=()=>{
    document.body.classList.add('print-contract');
    window.print();
    setTimeout(()=>document.body.classList.remove('print-contract'), 500);
  };
  document.getElementById('contractDocxBtn').onclick=()=>exportContractDocx(sel);
}

/* ---------- GENEROVÁNÍ HTML SMLOUVY ----------
   Dle režimu (pronájem / prodej) volá příslušnou variantu. */
function generateContractHTML(sel){
  if(isSale()) return generateSaleContractHTML(sel);
  return generateRentContractHTML(sel);
}

/* ---------- KUPNÍ SMLOUVA (prodej lisu) ---------- */
/* ---------- KUPNÍ SMLOUVA O PRODEJI LISU / LISŮ ----------
   Generuje smlouvu dle vzoru ELKOPLAST CZ — § 2079 a násl. obč. zákoníku.
   Obsahuje 12 článků + 3 přílohy (TS, Předávací protokol, Servisní podmínky). */
function generateSaleContractHTML(sel){
  const cl=STATE.client;
  const prof=Profiles.active();

  // Souhrn cen
  let sumProdej=0, sumOne=0;
  sel.forEach(p=>{ const c=calc(p,STATE.serviceMode); sumProdej+=c.prodejni; sumOne+=c.oneTimeTotal; });
  sumProdej=Math.round(sumProdej); sumOne=Math.round(sumOne);
  const dphCastka = Math.round(sumProdej*GP.dph);
  const sumProdejDph = sumProdej + dphCastka;

  const isMulti = sel.length>1;
  const predmetSouhrn = sel.map(p=>{
    const pz=prodIsZentex(p);
    return (sel.length>1?'1 ks ':'')+(pz?'mobilního lisovacího kontejneru':'elektrického balíkovacího lisu')+' '+p.id+(pz?'':' značky Bramidan');
  }).join(', ');

  // Příloha č. 1 — technická specifikace per lis
  const specTables = sel.map(p=>{
    const pz=prodIsZentex(p);
    const c=calc(p,STATE.serviceMode);
    const lines = pz
      ? [['Výrobce / značka','Zentex'],['Typ / model',p.id],['Kód výrobce',p.code||'—'],['Objem kontejneru',p.vol+' m³'],['Lisovací síla',p.force+' kN'],['Motor',p.motor],['Hydraulický olej',(p.oil||'—')+' L'],['Typ nosiče',p.carrier],['Napájení / příkon',p.power]]
      : [
          ['Výrobce / značka','Bramidan'],
          ['Typ / model',p.id],
          ['Série',(p.serie||'')+'-série'],
          ['Lisovací síla',p.force+' t'],
          ['Velikost balíku Š×H×V (Bale size WxDxH)',p.bale+' mm'],
          ['Plnicí otvor Š×V (Feed opening WxH)',p.feed+' mm'],
          ['Napájení (Power supply)',p.power],
          ['Motor (Motor)',(p.kw||'—')+' kW'],
          ['Průměrný čas cyklu (Cycle time avg.)',(p.cycle||'—')+' sec'],
          ['Rozměry stroje Š×H×V (Dimensions WxDxH)',(p.dims||'—')+' mm'],
          ['Hmotnost (Weight)',num(p.weight)+' kg'],
          ['Zdvih (Stroke)',(p.stroke?p.stroke+' mm':'—')],
          ['Počet vázání na balík (Number of ties)',(p.ties||'—')],
          ['Typ vázání (Type of tying)',(p.tyingType||'—')],
          ['Indikátor plného balíku (Full bale light)',(p.fullBaleLight?'ano':(p.fullBaleLight===false?'ne':'—'))],
          ['Vysunutí balíku (Bale eject)',(p.baleEject?'automatické':(p.baleEject===false?'ruční':'—'))],
          ['Hlučnost',p.noise+' dB'],
          ['Hydraulický olej',(p.oil||'—')+' L']
        ];
    return `<table class="spec-tbl"><tr><th colspan="2" class="spec-h">${pz?'':'Bramidan '}${p.id}</th></tr>
      <tr><td class="spec-k">Počet kusů</td><td class="spec-v">1</td></tr>
      ${lines.map(([k,v])=>`<tr><td class="spec-k">${k}</td><td class="spec-v">${v}</td></tr>`).join('')}
      <tr><td class="spec-k">Stav zařízení</td><td class="spec-v">nové</td></tr>
      <tr><td class="spec-k">Výrobní číslo</td><td class="spec-v">${esc(cl.serialNumbers && cl.serialNumbers[p.id] ? cl.serialNumbers[p.id] : '………………………………')}</td></tr>
      <tr><td class="spec-k">Rok výroby</td><td class="spec-v">${esc(cl.yearsMade && cl.yearsMade[p.id] ? cl.yearsMade[p.id] : '………………………………')}</td></tr>
      <tr><td class="spec-k">Určený lisovaný materiál</td><td class="spec-v">${esc((cl.waste||'papírový a plastový odpad').toLowerCase())}</td></tr>
      <tr><td class="spec-k">Součásti dodávky</td><td class="spec-v">stroj, návod k obsluze, prohlášení o shodě, záruční list</td></tr>
      <tr><td class="spec-k">Kupní cena za kus bez DPH</td><td class="spec-v"><b>${num(c.prodejni)} Kč</b></td></tr>
      <tr><td class="spec-k">Doprava / vykládka</td><td class="spec-v">${num(p.doprava)} Kč (účtováno zvlášť)</td></tr>
      <tr><td class="spec-k">Uvedení do provozu</td><td class="spec-v">zahrnuto v ceně dodávky</td></tr>
      <tr><td class="spec-k">Zaškolení obsluhy</td><td class="spec-v">zahrnuto v ceně dodávky (rozsah min. 2 hod)</td></tr>
    </table>`;
  }).join('<div style="height:14px"></div>');

  // Cenová rekapitulace - položkově
  const cenRows = sel.map((p,i)=>{
    const c=calc(p,STATE.serviceMode);
    const pz=prodIsZentex(p);
    return `<tr>
      <td>${i+1}</td>
      <td>${pz?'':'Bramidan '}${p.id}</td>
      <td style="text-align:center">1</td>
      <td style="text-align:right">${num(c.prodejni)} Kč</td>
      <td style="text-align:right">${num(c.prodejni)} Kč</td>
      <td>${pz?'mob. lisovací stroj':'vert. balíkovací lis'}</td>
    </tr>`;
  }).join('');

  const dnes = new Date().toLocaleDateString('cs-CZ');
  const obchodnik = prof ? esc(prof.name||'') + (prof.email?', e-mail '+esc(prof.email):'') + (prof.phone?', tel. '+esc(prof.phone):'') : '………………………………';
  const obchodnikJmeno = prof ? esc(prof.name||'') : '………………………………';
  const dotNebo = v => v && v.trim() ? esc(v) : '…………………………………………';
  const datumDodani = cl.datumPocatku && cl.datumPocatku.trim() ? esc(cl.datumPocatku) : '……………';
  const zaruka = cl.zaruka && cl.zaruka.trim() ? esc(cl.zaruka) : '24 měsíců';
  const zarukaNum = (zaruka.match(/\d+/)?.[0]) || '24';

  return `
  <article class="contract">
    <header class="ctr-head">
      <h1>Kupní smlouva</h1>
      <div class="ctr-sub">o prodeji ${sel.length>1?'lisů':'lisu'}</div>
      <p style="font-size:11px;font-style:italic;color:#666;margin:8px 0 4px;font-weight:400">uzavřená podle § 2079 a násl. zákona č. 89/2012 Sb., občanský zákoník</p>
    </header>

    <p>Níže uvedené smluvní strany:</p>

    <table class="ctr-party">
      <tr><th colspan="2">Prodávající:</th></tr>
      <tr><td class="k">Název:</td><td class="v"><b>${COMPANY.name}</b></td></tr>
      <tr><td class="k">Sídlo:</td><td class="v">${COMPANY.sidlo}</td></tr>
      <tr><td class="k">IČ:</td><td class="v">${COMPANY.ico}</td></tr>
      <tr><td class="k">DIČ:</td><td class="v">${COMPANY.dic}</td></tr>
      <tr><td class="k">Zápis v OR:</td><td class="v">${COMPANY.zapisOR}</td></tr>
      <tr><td class="k">Zastoupená:</td><td class="v"><b>${COMPANY.jednatel}</b>, ${COMPANY.jednatelFn}</td></tr>
      <tr><td class="k">Kontaktní osoba pro smluvní věci:</td><td class="v">${obchodnik}</td></tr>
      <tr><td class="k">Kontaktní osoba pro technické a servisní věci:</td><td class="v">e-mail: ${COMPANY.servisEmail}</td></tr>
      <tr><td class="k">Fakturační e-mail:</td><td class="v">${COMPANY.servisEmail}</td></tr>
      <tr><td class="k">Bankovní spojení:</td><td class="v">…………………………………………</td></tr>
    </table>
    <p class="ctr-and-sub">(dále jen „prodávající")</p>

    <div class="ctr-and">a</div>

    <table class="ctr-party">
      <tr><th colspan="2">Kupující:</th></tr>
      <tr><td class="k">Obchodní firma / jméno:</td><td class="v"><b>${dotNebo(cl.company)}</b></td></tr>
      <tr><td class="k">Sídlo / adresa:</td><td class="v">${dotNebo(cl.sidlo)}</td></tr>
      <tr><td class="k">IČ:</td><td class="v">${dotNebo(cl.ico)}</td></tr>
      ${cl.dic?`<tr><td class="k">DIČ:</td><td class="v">${esc(cl.dic)}</td></tr>`:'<tr><td class="k">DIČ:</td><td class="v">…………………………………………</td></tr>'}
      <tr><td class="k">Zápis v OR:</td><td class="v">…………………………………………</td></tr>
      <tr><td class="k">Zastoupený:</td><td class="v">${dotNebo(cl.name)}</td></tr>
      <tr><td class="k">Kontaktní osoba pro smluvní věci:</td><td class="v">${dotNebo(cl.contact)}</td></tr>
      <tr><td class="k">Kontaktní osoba pro technické věci:</td><td class="v">…………………………………………</td></tr>
      <tr><td class="k">Místo dodání / provozovna:</td><td class="v">${dotNebo(cl.mistoPlneni)}</td></tr>
      <tr><td class="k">Fakturační e-mail:</td><td class="v">${dotNebo(cl.fakturEmail)}</td></tr>
    </table>
    <p class="ctr-and-sub">(dále jen „kupující")</p>

    <p style="margin-top:14px">Prodávající a kupující dále společně také jako „smluvní strany" nebo jednotlivě jako „smluvní strana".</p>

    <h2>Článek 1 — Předmět smlouvy</h2>
    <ol class="ctr-list">
      <li>Prodávající prohlašuje, že je vlastníkem nebo osobou oprávněnou prodat ${sel.length>1?'lisy':'lis'} specifikovaný${sel.length>1?'é':''} v příloze č. 1 této smlouvy (dále jen „<b>předmět koupě</b>").</li>
      <li>Prodávající se zavazuje odevzdat kupujícímu předmět koupě, umožnit mu nabýt vlastnické právo k předmětu koupě a poskytnout související plnění sjednaná touto smlouvou. Kupující se zavazuje předmět koupě převzít a zaplatit prodávajícímu kupní cenu.</li>
      <li>Předmětem koupě je zejména ${esc(predmetSouhrn)} dle specifikace uvedené v příloze č. 1 a v předávacím protokolu.</li>
      <li>Předmět koupě je prodáván jako <b>nový</b>. U použitého nebo předváděcího zařízení by se jeho stav, známé vady, motohodiny a opotřebení uvedly v příloze č. 1 nebo v předávacím protokolu.</li>
      <li>Předmět koupě je určen k lisování <b>${esc((cl.waste||'papírového a plastového odpadu').toLowerCase())}</b>. Kupující není oprávněn používat lis k lisování materiálů, které jsou v rozporu s návodem k obsluze, zejména nebezpečných, výbušných, kapalných, kovových, žhavých nebo jinak nevhodných materiálů, není-li výslovně písemně sjednáno jinak.</li>
      <li>Kupující potvrzuje, že se před podpisem smlouvy seznámil s technickými parametry předmětu koupě a že předmět koupě podle těchto parametrů odpovídá jeho zamýšlenému účelu použití.</li>
    </ol>

    <h2>Článek 2 — Kupní cena a platební podmínky</h2>
    <ol class="ctr-list">
      <li>Kupní cena za předmět koupě činí <b>${num(sumProdej)} Kč bez DPH</b>. K této částce bude připočtena DPH v zákonné výši platné ke dni uskutečnění zdanitelného plnění (${pct(GP.dph)} = ${num(dphCastka)} Kč), <b>celkem tedy ${num(sumProdejDph)} Kč s DPH</b>.
        <table class="ctr-price" style="margin-top:10px">
          <thead><tr><th>Č.</th><th>Název položky</th><th style="text-align:center">Počet</th><th style="text-align:right">Jedn. cena bez DPH</th><th style="text-align:right">Celkem bez DPH</th><th>Poznámka</th></tr></thead>
          <tbody>
            ${cenRows}
            <tr><td colspan="5" style="text-align:right;font-weight:700;border-top:2px solid #333">Celkem bez DPH:</td><td style="text-align:right;font-weight:700;border-top:2px solid #333">${num(sumProdej)} Kč</td></tr>
            <tr><td colspan="5" style="text-align:right">DPH ${pct(GP.dph)}:</td><td style="text-align:right">${num(dphCastka)} Kč</td></tr>
            <tr><td colspan="5" style="text-align:right;font-weight:800;background:#fff3c4">CELKEM s DPH:</td><td style="text-align:right;font-weight:800;background:#fff3c4">${num(sumProdejDph)} Kč</td></tr>
          </tbody>
        </table>
      </li>
      <li>Kupní cena zahrnuje <b>lis, základní příslušenství, uvedení do provozu a základní zaškolení obsluhy</b>. Kupní cena nezahrnuje dopravu, vykládku, stavební připravenost, elektroinstalaci ani revize provozovny kupujícího, není-li v této smlouvě nebo v příloze č. 1 uvedeno jinak. Jednorázové položky (doprava, instalace) činí <b>${num(sumOne)} Kč bez DPH</b>.</li>
      <li>Prodávající vystaví kupujícímu fakturu <b>po podpisu smlouvy</b> se splatností <b>14 dnů</b> ode dne jejího vystavení, nebude-li na faktuře uvedena delší splatnost.</li>
      <li>Je-li sjednána záloha, kupující uhradí zálohu ve výši ……………… Kč bez DPH do ……… dnů od podpisu smlouvy. Prodávající není v prodlení s dodáním po dobu prodlení kupujícího s úhradou zálohy nebo jiné splatné částky.</li>
      <li>Kupní cena se považuje za uhrazenou okamžikem připsání celé příslušné částky na bankovní účet prodávajícího.</li>
      <li>Faktury budou zasílány elektronicky na fakturační e-mail kupujícího: <b>${dotNebo(cl.fakturEmail)}</b>. Kupující souhlasí s elektronickou fakturací.</li>
    </ol>

    <h2>Článek 3 — Dodání, instalace a předání</h2>
    <ol class="ctr-list">
      <li>Místem dodání je <b>${dotNebo(cl.mistoPlneni)}</b>, nebude-li smluvními stranami písemně sjednáno jiné místo.</li>
      <li>Termín dodání: <b>${datumDodani}</b>. Termín dodání se přiměřeně prodlužuje o dobu, po kterou kupující neposkytl prodávajícímu potřebnou součinnost, zejména nepřipravil místo dodání, neumožnil přístup, nezajistil vykládku nebo neuhradil splatnou část ceny.</li>
      <li>Dopravu a vykládku předmětu koupě zajišťuje <b>prodávající</b>. Náklady na dopravu, vykládku a manipulaci hradí <b>kupující</b> dle položek uvedených v příloze č. 1.</li>
      <li>Kupující je povinen před dodáním zajistit stavební, prostorovou, manipulační a elektro připravenost místa dodání, včetně dostatečného přístupu, únosnosti podlahy, manipulační techniky, přívodu elektrické energie a osob oprávněných k převzetí.</li>
      <li>Prodávající provede základní uvedení do provozu a základní zaškolení obsluhy v rozsahu uvedeném v příloze č. 1. O uvedení do provozu a zaškolení obsluhy bude proveden záznam v předávacím protokolu.</li>
      <li>O předání a převzetí předmětu koupě bude sepsán předávací protokol podle přílohy č. 2. Kupující je povinen při převzetí předmět koupě prohlédnout a zapsat do protokolu zjevné vady, chybějící součásti nebo výhrady.</li>
      <li>Kupující je oprávněn odmítnout převzetí pouze pro vadu, která podstatně brání řádnému užívání předmětu koupě. Drobné vady nebo nedodělky, které nebrání bezpečnému a obvyklému užívání, nejsou důvodem pro odmítnutí převzetí; uvedou se v předávacím protokolu včetně lhůty pro jejich odstranění.</li>

    <h2>Článek 4 — Přechod vlastnického práva a nebezpečí škody</h2>

      <li>Nebezpečí škody na předmětu koupě přechází na kupujícího okamžikem jeho předání kupujícímu nebo dopravci určenému kupujícím, podle toho, co nastane dříve.</li>
      <li>Do přechodu vlastnického práva není kupující oprávněn předmět koupě prodat, pronajmout, zastavit, přenechat třetí osobě k užívání ani jinak zatížit bez předchozího písemného souhlasu prodávajícího.</li>
      <li>Kupující je povinen bez zbytečného odkladu oznámit prodávajícímu jakékoli ohrožení předmětu koupě výkonem rozhodnutí, exekucí, insolvencí nebo právy třetích osob, dokud vlastnické právo k předmětu koupě nepřejde na kupujícího.</li>
    </ol>

    <h2>Článek 5 — Dokumentace, provoz a bezpečnost</h2>
    <ol class="ctr-list">
      <li>Prodávající předá kupujícímu dokumentaci potřebnou pro užívání předmětu koupě v rozsahu uvedeném v příloze č. 1 nebo v předávacím protokolu, zejména návod k obsluze, technickou specifikaci, záruční list, prohlášení o shodě nebo jiné doklady, jsou-li pro daný předmět koupě k dispozici nebo právními předpisy vyžadovány.</li>

      <li>Kupující zajistí, aby předmět koupě obsluhovaly pouze osoby řádně proškolené a zdravotně a odborně způsobilé, vyžaduje-li to povaha provozu nebo právní předpisy.</li>
      <li>Po předání předmětu koupě nese kupující veškeré provozní náklady, zejména náklady na elektrickou energii, obsluhu, běžnou údržbu, čistění, spotřební materiál a pravidelné kontroly nebo revize provozu, není-li písemně sjednáno jinak.</li>
      <li>Kupující je povinen vést evidenci provozu, údržby a servisních zásahů, zejména stav motohodin, provedené servisní úkony a zjištěné závady. Tuto evidenci předloží prodávajícímu při uplatnění záruky nebo servisního požadavku, požádá-li o to prodávající.</li>
    </ol>

    <h2>Článek 6 — Vady, reklamace a záruka</h2>
    <ol class="ctr-list">
      <li>Prodávající odpovídá za vady, které má předmět koupě při přechodu nebezpečí škody na kupujícího, a za vady, které vzniknou později porušením povinností prodávajícího.</li>
      <li>Prodávající poskytuje kupujícímu <b>záruku za jakost v délce ${esc(zaruka)}</b> ode dne předání předmětu koupě, případně ode dne uvedení do provozu prodávajícím, je-li uvedení do provozu sjednáno a proběhne nejpozději do 30 dnů od dodání.</li>
      <li>Záruka <b>se nevztahuje</b> na vady vzniklé běžným opotřebením, nevhodným nebo nesprávným užíváním, přetížením, lisováním nevhodného materiálu, neodborným zásahem, nedodržením návodu k obsluze, zanedbáním údržby, vnější událostí, nevhodným prostředím, poškozením elektrické sítě nebo použitím neoriginálních dílů bez souhlasu prodávajícího.</li>
      <li>Kupující je povinen vady oznámit prodávajícímu bez zbytečného odkladu poté, co je zjistí nebo při dostatečné péči zjistit mohl. Oznámení vady musí obsahovat alespoň identifikaci předmětu koupě, výrobní číslo, popis vady, okolnosti jejího vzniku, stav motohodin a podle možností fotodokumentaci nebo videozáznam.</li>
      <li>Prodávající po oznámení vady posoudí oprávněnost reklamace a navrhne způsob řešení, zejména opravu, výměnu vadné součásti, doplnění chybějící dokumentace, přiměřenou slevu nebo jiné řešení podle povahy vady a právních předpisů.</li>
      <li>Kupující není oprávněn bez předchozího souhlasu prodávajícího provést opravu prostřednictvím třetí osoby na náklady prodávajícího, ledaže jde o odvracení bezprostředně hrozící škody nebo prodávající reklamaci neřeší ani v dodatečné přiměřené lhůtě.</li>
    </ol>

    <h2>Článek 7 — Servis a náhradní díly</h2>
    <ol class="ctr-list">

      <li>Doporučený pravidelný servis předmětu koupě je <b>nejméně 1× ročně nebo po dosažení 500 motohodin</b>, podle toho, co nastane dříve, není-li výrobcem nebo návodem k obsluze stanoveno jinak.</li>
      <li>Servisní zásahy mimo záruku, zásahy vyvolané nesprávným užíváním, zásahy mimo běžnou pracovní dobu a dodávky náhradních dílů hradí kupující podle přílohy č. 3 nebo podle samostatné cenové nabídky prodávajícího.</li>
      <li>Prodávající není v prodlení se servisním zásahem po dobu, kdy kupující neposkytne potřebnou součinnost, neumožní přístup k zařízení, nezajistí bezpečné podmínky nebo neposkytne informace potřebné pro diagnostiku vady.</li>
    </ol>

    <h2>Článek 8 — Sankce a prodlení</h2>
    <ol class="ctr-list">
      <li>V případě prodlení kupujícího s úhradou jakékoli peněžité částky je prodávající oprávněn požadovat úrok z prodlení ve výši <b>0,05 % z dlužné částky včetně DPH za každý i započatý den prodlení</b>.</li>
      <li>Je-li kupující v prodlení s úhradou kupní ceny, je prodávající oprávněn pozastavit dodání, instalaci, předání dokumentace, servis nebo jiné plnění až do úplného uhrazení splatných částek; tím nejsou dotčeny nároky prodávajícího z prodlení kupujícího.</li>
      <li>Je-li kupující v prodlení s převzetím předmětu koupě déle než <b>5 pracovních dnů</b>, je prodávající oprávněn požadovat po kupujícím náhradu účelně vynaložených nákladů na skladování, manipulaci a opakovanou dopravu a smluvní pokutu ve výši <b>1 500 Kč za každý den prodlení s převzetím</b>.</li>
      <li>Je-li prodávající v prodlení s dodáním předmětu koupě z důvodů výlučně na straně prodávajícího déle než 10 pracovních dnů, může kupující požadovat smluvní pokutu ve výši <b>0,05 % z kupní ceny nedodaného předmětu koupě bez DPH za každý den prodlení</b>, nejvýše však 10 % této kupní ceny. Toto ujednání se nepoužije při prodlení způsobeném neposkytnutím součinnosti kupujícího, vyšší mocí nebo prodlením dodavatele, které prodávající nemohl rozumně ovlivnit.</li>
      <li>Ujednáním smluvní pokuty není dotčeno právo smluvní strany požadovat náhradu škody v rozsahu, v jakém převyšuje zaplacenou smluvní pokutu, není-li v této smlouvě sjednáno jinak.</li>
    </ol>

    <h2>Článek 9 — Odstoupení od smlouvy</h2>
    <ol class="ctr-list">
      <li>Prodávající je oprávněn odstoupit od smlouvy, pokud je kupující v prodlení s úhradou kupní ceny nebo zálohy déle než <b>30 dnů</b>, pokud kupující bez oprávněného důvodu nepřevezme předmět koupě ani v dodatečné lhůtě nejméně 10 dnů, nebo pokud kupující podstatně poruší povinnost podle čl. 4.3 této smlouvy.</li>
      <li>Kupující je oprávněn odstoupit od smlouvy, pokud je prodávající v prodlení s dodáním předmětu koupě déle než <b>30 dnů</b> a nesplní povinnost ani v dodatečné přiměřené lhůtě poskytnuté kupujícím písemně.</li>
      <li>Odstoupením od smlouvy nejsou dotčena práva na zaplacení smluvních pokut, úroků z prodlení, náhrady škody, náhrady nákladů ani ustanovení, která mají podle své povahy trvat i po zániku smlouvy.</li>
      <li>Pokud před odstoupením došlo k předání předmětu koupě a vlastnické právo nepřešlo na kupujícího, je kupující povinen předmět koupě bez zbytečného odkladu vydat prodávajícímu ve stavu odpovídajícímu obvyklému opotřebení. Náklady na odebrání, dopravu a uvedení do původního stavu hradí strana, která porušení smlouvy způsobila.</li>
    </ol>

    <h2>Článek 10 — Náhrada škody a vyšší moc</h2>
    <ol class="ctr-list">
      <li>Každá smluvní strana odpovídá za škodu způsobenou porušením této smlouvy nebo právních předpisů.</li>
      <li>Celková náhrada škody jedné smluvní strany vůči druhé smluvní straně vzniklá z této smlouvy nebo v souvislosti s ní <b>nepřesáhne kupní cenu předmětu koupě bez DPH</b>. Toto omezení se neuplatní u škody způsobené úmyslně nebo z hrubé nedbalosti, u újmy na přirozených právech člověka a v případech, kdy omezení odpovědnosti právní předpisy nepřipouštějí.</li>
      <li>Smluvní strana není odpovědná za prodlení nebo škodu způsobenou okolností <b>vyšší moci</b>, zejména mimořádnou nepředvídatelnou a nepřekonatelnou překážkou vzniklou nezávisle na její vůli. Dotčená strana je povinna bez zbytečného odkladu informovat druhou stranu a učinit přiměřené kroky ke zmírnění následků.</li>
    </ol>

    <ol class="ctr-list">

      <li>Povinnost mlčenlivosti se nevztahuje na informace, které musí smluvní strana zpřístupnit podle právního předpisu, rozhodnutí orgánu veřejné moci, auditorovi, daňovému poradci, právnímu zástupci nebo osobám podílejícím se na plnění této smlouvy, pokud jsou vázány odpovídající povinností mlčenlivosti.</li>
    </ol>

    <h2>Článek 12 — Závěrečná ustanovení</h2>
    <ol class="ctr-list">
      <li>Tato smlouva a právní vztahy z ní vyplývající se řídí <b>právním řádem České republiky</b>, zejména zákonem č. 89/2012 Sb., občanský zákoník.</li>
      <li>Případné spory budou smluvní strany řešit přednostně jednáním. Nedojde-li k dohodě, bude spor rozhodovat věcně a místně příslušný soud České republiky; smluvní strany se mohou dohodnout také na místní příslušnosti soudu podle sídla prodávajícího, pokud to právní předpisy připouštějí.</li>
      <li>Změny nebo doplnění této smlouvy vyžadují <b>písemnou formu</b> a podpis obou smluvních stran, není-li v této smlouvě výslovně uvedeno jinak. Za písemnou formu se považuje také elektronický podpis splňující požadavky právních předpisů.</li>
      <li>Je-li nebo stane-li se některé ustanovení této smlouvy neplatným, neúčinným nebo nevykonatelným, není tím dotčena platnost, účinnost a vykonatelnost ostatních ustanovení. Smluvní strany nahradí takové ustanovení ustanovením platným, účinným a vykonatelným, které co nejvíce odpovídá původnímu účelu.</li>
      <li>Práva a povinnosti z této smlouvy přecházejí na právní nástupce smluvních stran. Kupující není oprávněn postoupit práva nebo převést povinnosti z této smlouvy bez předchozího písemného souhlasu prodávajícího.</li>
      <li>Tato smlouva nabývá platnosti a účinnosti dnem podpisu oběma smluvními stranami.</li>
      <li>Tato smlouva je vyhotovena ve <b>dvou stejnopisech</b>, z nichž každá smluvní strana obdrží jeden stejnopis. Při elektronickém podpisu se vyhotovení ve stejnopisech nevyžaduje.</li>

function generateRentContractHTML(sel){
  const cl=STATE.client;
  const prof=Profiles.active();
  const indef=isIndefinite();
  const dobaText = indef ? 'na dobu neurčitou' : ('na dobu určitou ('+termLabel()+')');

  // souhrn cen
  let sumMonth=0, sumOne=0;
  sel.forEach(p=>{ const c=calc(p,STATE.serviceMode); sumMonth+=c.celkemMesicVcServ; sumOne+=c.oneTimeTotal; });
  sumMonth=Math.round(sumMonth); sumOne=Math.round(sumOne);

  // název smlouvy podle počtu lisů
  const isMulti = sel.length>1;
  const predmetText = sel.map(p=>{
    const pz=prodIsZentex(p);
    return '1 ks '+(pz?'mobilního lisovacího kontejneru':'elektrického balíkovacího lisu')+' '+p.id+(pz?'':' značky Bramidan');
  }).join(', ');
  const nazevPredmetu = sel.length===1
    ? ( prodIsZentex(sel[0]) ? 'mobilního lisovacího kontejneru '+sel[0].id : 'lisu '+sel[0].id )
    : 'lisovací techniky';

  // technická specifikace - příloha č. 1
  const specRows = sel.map(p=>{
    const pz=prodIsZentex(p);
    const lines = pz
      ? [['Model', 'Zentex '+p.id],['Kód výrobce', p.code||'—'],['Objem kontejneru', p.vol+' m³'],['Lisovací síla', p.force+' kN'],['Motor', p.motor],['Hydraulický olej', (p.oil||'—')+' L'],['Typ nosiče', p.carrier],['Napájení', p.power]]
      : [
          ['Model', 'Bramidan '+p.id],
          ['Série', (p.serie||'')+'-série'],
          ['Lisovací síla', p.force+' t'],
          ['Velikost balíku Š×H×V (Bale size WxDxH)', p.bale+' mm'],
          ['Plnicí otvor Š×V (Feed opening WxH)', p.feed+' mm'],
          ['Napájení (Power supply)', p.power],
          ['Motor (Motor)', (p.kw||'—')+' kW'],
          ['Průměrný čas cyklu (Cycle time avg.)', (p.cycle||'—')+' sec'],
          ['Rozměry stroje Š×H×V (Dimensions WxDxH)', (p.dims||'—')+' mm'],
          ['Hmotnost (Weight)', num(p.weight)+' kg'],
          ['Zdvih (Stroke)', (p.stroke?p.stroke+' mm':'—')],
          ['Počet vázání na balík (Number of ties)', (p.ties||'—')],
          ['Typ vázání (Type of tying)', (p.tyingType||'—')],
          ['Indikátor plného balíku (Full bale light)', (p.fullBaleLight?'ano':(p.fullBaleLight===false?'ne':'—'))],
          ['Vysunutí balíku (Bale eject)', (p.baleEject?'automatické':(p.baleEject===false?'ruční':'—'))],
          ['Hlučnost', p.noise+' dB'],
          ['Hydraulický olej', (p.oil||'—')+' L']
        ];
    return `<table class="spec-tbl"><tr><th colspan="2" class="spec-h">${pz?'':'Bramidan '}${p.id}</th></tr>
      ${lines.map(([k,v])=>`<tr><td class="spec-k">${k}</td><td class="spec-v">${v}</td></tr>`).join('')}
      <tr><td class="spec-k">Výrobní číslo</td><td class="spec-v">${esc(cl.serialNumbers && cl.serialNumbers[p.id] ? cl.serialNumbers[p.id] : '………………………………')}</td></tr>
      <tr><td class="spec-k">Rok výroby</td><td class="spec-v">${esc(cl.yearsMade && cl.yearsMade[p.id] ? cl.yearsMade[p.id] : '………………………………')}</td></tr>
    </table>`;
  }).join('<div style="height:14px"></div>');

  // ceník na nájem - jeden řádek per lis
  const cenRows = sel.map(p=>{
    const c=calc(p,STATE.serviceMode);
    const pz=prodIsZentex(p);
    const celkemDph = Math.round(c.celkemMesicVcServ*(1+GP.dph));
    return `<tr>
      <td>${pz?'':'Bramidan '}${p.id}</td>
      <td style="text-align:right">${num(c.najemMesic)} Kč</td>
      <td style="text-align:right">${num(c.servisMesic)} Kč</td>
      <td style="text-align:right;font-weight:700">${num(c.celkemMesicVcServ)} Kč<br><span style="font-weight:400;font-size:11px;color:#666">${num(celkemDph)} Kč s DPH</span></td>
    </tr>`;
  }).join('');

  const dnes = new Date().toLocaleDateString('cs-CZ');
  const obchodnik = prof ? (prof.name||'') + (prof.email?', e-mail '+esc(prof.email):'') + (prof.phone?', tel. '+esc(prof.phone):'') : '………………………………';
  const dotNebo = v => v && v.trim() ? esc(v) : '…………………………………………';

      <tr><td class="k">IČ:</td><td class="v">${dotNebo(cl.ico)}</td></tr>
      ${cl.dic?`<tr><td class="k">DIČ:</td><td class="v">${esc(cl.dic)}</td></tr>`:''}
      <tr><td class="k">Zastoupený ve věcech smluvních:</td><td class="v">${dotNebo(cl.name)}</td></tr>
