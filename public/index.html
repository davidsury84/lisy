/* ============================================================
   MODUL: NÁVRATNOST INVESTICE (ROI / break-even pro ELKOPLAST)
   ============================================================
   Pohled ELKOPLAST jako pronajímatel/prodejce:
   - Investice: nákupní cena stroje (kapitál, který musí ELKOPLAST vynaložit
     pro pořízení od dodavatele).
   - Měsíční zisk: čistý nájem (po slevě za závazek). Servis je nákladově
     neutrální (klient ho platí jako součást nájmu, ELKOPLAST za něj má
     odpovídající náklady).
   - U PRODEJE: jednorázový zisk = prodejní cena − nákupní cena.
   Break-even = měsíc, kdy se kumulovaný cash flow stane kladným. */
/* Aktuální tržní cena stroje na základě stáří
   Model: lineární odpis k zůstatkové hodnotě (RV) za 5 let.
   Po 5+ letech stroj zůstává na RV (40 % defaultně). */
function trzniCena(p, vekLet){
  const v = +vekLet || 0;
  const rv = p.nakup * GP.rvPct;
  if(v <= 0) return p.nakup;
  if(v >= 5) return rv;
  // lineárně mezi nákupní (rok 0) a RV (rok 5)
  return Math.round(p.nakup - (p.nakup - rv) * (v / 5));
}

/* ROI / Návratnost pro ELKOPLAST - rozšířený model s NPV a vrstvami nákladů */
function roiCalc(p){
  const c = calc(p, STATE.serviceMode);
  const sale = isSale();
  if(sale){
    // Prodej: zisk = prodejní − nákupní (jednorázově)
    const profit = c.prodejni - p.nakup;
    return {
      sale: true,
      invest: p.nakup,
      revenue: c.prodejni,
      profit: profit,
      profitPct: profit / p.nakup * 100,
      breakMonth: profit >= 0 ? 0 : Infinity
    };
  }
  // ----- PRONÁJEM -----
  const vekLet = +(p.vekLet || 0);       // stáří stroje (0 = nový)
  const trzni = trzniCena(p, vekLet);    // aktuální tržní cena (= invest pro NPV)
  const invest = p.nakup;                // pořizovací cena (pro ROI z pořizovací)
  const indef = c.indef;
  const months = indef ? 60 : c.months;  // u doby neurčité počítáme 5 let jako horizont pro NPV
  const horizonY = months / 12;

  // ----- VRSTVY NÁKLADŮ ELKOPLAST (per měsíc) -----
  const kapitalMes = invest * GP.najemProc;       // kapitálová splátka (sazba × nákupní)
  const servisMes = c.servisMesic;                // servis (klient platí, ELKOPLAST má náklad ~stejný)
  const pojiMes = invest * GP.poji / 12;          // pojištění majetku ELKOPLAST
  const adminMes = GP.adminMes;                   // provozní režie
  const slevaSrazka = invest * GP.najemProc * c.sleva;  // sleva za závazek (ELKOPLAST přijde o)
  const margeMes = c.najemMesic - kapitalMes - pojiMes - adminMes; // co zbude = čistá marže

  // ----- ČISTÝ MĚSÍČNÍ CASH FLOW ELKOPLAST (pro NPV) -----
  // = nájem stroje (kapitál) - pojištění - admin
  // Pozn: servis je nákladově neutrální (klient platí, ELKOPLAST vykrývá ze servisních splátek)
  const cfMes = c.najemMesic - pojiMes - adminMes;
  const monthlyProfit = c.najemMesic;             // pro payback bereme HRUBÝ nájem stroje (= návratnost kapitálu)

  // ----- BREAK-EVEN (payback) -----
  // Cílem je, aby se kapitál vrátil za invest / (invest × sazba) = 1/sazba měsíců
  // Při sazbě 2,8 % → 36 měsíců přesně (návratnost kapitálu stroje)
  const breakMonth = monthlyProfit > 0 ? Math.ceil(invest / monthlyProfit) : Infinity;
  const totalRevenue = cfMes * months;
  const totalProfit = totalRevenue - invest + (vekLet>=0 ? p.nakup * GP.rvPct : 0);    // jednoduchý zisk vč. RV

  // ----- ZŮSTATKOVÁ HODNOTA na konci horizontu -----
  const vekPoSmlouve = vekLet + horizonY;
  const rvEnd = vekPoSmlouve >= 5 ? invest * GP.rvPct : Math.round(invest - (invest - invest*GP.rvPct) * (vekPoSmlouve / 5));

  // ----- NPV (Net Present Value) -----
  // CF se diskontuje měsíčně; RV se přidá na konci.
  const iM = GP.diskont / 12;
  let npv = -invest;
  for(let t=1; t<=months; t++) npv += cfMes / Math.pow(1+iM, t);
  npv += rvEnd / Math.pow(1+iM, months);
  npv = Math.round(npv);

  // NPV s tržní cenou jako alternativa: ELKOPLAST má stroj a může ho prodat za trzni,
  // nebo ho dál pronajímat. Pak invest pro NPV je trzni (oportunitní náklad).
  let npvTrzni = -trzni;
  for(let t=1; t<=months; t++) npvTrzni += cfMes / Math.pow(1+iM, t);
  npvTrzni += rvEnd / Math.pow(1+iM, months);
  npvTrzni = Math.round(npvTrzni);

  // ----- DVĚ ROI VARIANTY (per dokument) -----
  // ROI na pořizovací = roční CF / pořizovací cena (pro CAPEX rozhodnutí)
  // ROI na tržní = roční CF / aktuální tržní cena (pro "držet vs. prodat")
  const cfYear = cfMes * 12;
  const roiPorizovaci = invest > 0 ? cfYear / invest : 0;
  const roiTrzni = trzni > 0 ? cfYear / trzni : 0;

  return {
    sale: false,
    invest,                                     // pořizovací cena
    trzni,                                      // aktuální tržní cena
    vekLet,
    monthlyProfit,                              // čistý CF / měs
    breakMonth,
    horizonMonths: months,
    indef,
    totalRevenue,
    totalProfit,
    sleva: c.sleva,
    // Vrstvy nákladů
    layers: {
      kapital: Math.round(kapitalMes),
      servis: Math.round(servisMes),
      poji: Math.round(pojiMes),
      admin: Math.round(adminMes),
      marze: Math.round(margeMes),
      slevaSrazka: Math.round(slevaSrazka)
    },
    cfMes: Math.round(cfMes),
    // NPV a ROI
    rvEnd: Math.round(rvEnd),
    npv,
    npvTrzni,
    roiPorizovaci,
    roiTrzni,
    diskont: GP.diskont
  };
}

/* SVG křivka kumulovaného cash flow pro ELKOPLAST */
function roiChartSVG(items){
  // rozsah X = max ze všech break-evenů × 1.5, min. 24 měsíců, max. 120 měsíců
  let maxM = 24;
  items.forEach(o=>{ if(isFinite(o.r.breakMonth)) maxM = Math.max(maxM, Math.round(o.r.breakMonth * 1.5)); maxM = Math.max(maxM, o.r.horizonMonths||0); });
  maxM = Math.min(120, Math.max(24, maxM));
  // Y rozsah: nejhlubší investice a nejvyšší finální zisk
  let yMin = 0, yMax = 0;
  items.forEach(o=>{ yMin = Math.min(yMin, -o.r.invest); yMax = Math.max(yMax, o.r.monthlyProfit*maxM - o.r.invest); });
  yMin *= 1.05; yMax = Math.max(yMax*1.1, 50000);

  const W = 760, H = 360, padL = 84, padR = 24, padT = 22, padB = 50;
  const innerW = W - padL - padR, innerH = H - padT - padB;
  const xAt = m => padL + (m/maxM)*innerW;
  const yAt = v => padT + innerH - ((v - yMin)/(yMax - yMin))*innerH;
  const colors = ['#ffce1f','#3ad17e','#5a7fb5','#e26060','#a78bfa','#22d3ee','#fb923c','#84cc16'];

  // Y-ticky každých ~80k Kč (přizpůsobíme rozsahu)
  const range = yMax - yMin;
  const stepRaw = range / 6;
  const mag = Math.pow(10, Math.floor(Math.log10(stepRaw)));
  const step = Math.ceil(stepRaw / mag) * mag;
  const yTicks = [];
  for(let v = Math.ceil(yMin/step)*step; v <= yMax; v += step) yTicks.push(v);

  // X-ticky každých 6 nebo 12 měsíců
  const xStep = maxM > 60 ? 12 : 6;
  const xTicks = [];
  for(let m = 0; m <= maxM; m += xStep) xTicks.push(m);

  const fmtK = v => Math.abs(v) >= 1000 ? (v/1000).toFixed(0)+'k' : ''+Math.round(v);

  // Křivky per lis
  const lines = items.map((o,i)=>{
    const r = o.r;
    const color = colors[i % colors.length];
    // 0..maxM, krok 1: cash(t) = monthlyProfit * t - invest
    const pts = [];
    for(let m = 0; m <= maxM; m++){
      const v = r.monthlyProfit * m - r.invest;
      pts.push(xAt(m)+','+yAt(v));
    }
    const beX = isFinite(r.breakMonth) && r.breakMonth <= maxM ? xAt(r.breakMonth) : null;
    return {
      path: '<polyline points="'+pts.join(' ')+'" fill="none" stroke="'+color+'" stroke-width="2.4" />',
      breakLine: beX!=null ? '<line x1="'+beX+'" y1="'+padT+'" x2="'+beX+'" y2="'+(padT+innerH)+'" stroke="'+color+'" stroke-width="1" stroke-dasharray="3,3" opacity=".55"/>' : '',
      breakDot: beX!=null ? '<circle cx="'+beX+'" cy="'+yAt(0)+'" r="5" fill="'+color+'" stroke="#0f1218" stroke-width="2"/>' : '',
      label: o.p.id, color
    };
  });

  // Osa Y - nula čára (break-even level)
  const y0 = yAt(0);

  return `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" class="roi-svg" role="img" aria-label="Návratová křivka">
    <!-- pozadí -->
    <rect x="${padL}" y="${padT}" width="${innerW}" height="${innerH}" fill="#0d1118" rx="6"/>
    <!-- y mřížka -->
    ${yTicks.map(v=>`<line x1="${padL}" y1="${yAt(v)}" x2="${padL+innerW}" y2="${yAt(v)}" stroke="${v===0?'#5e6b85':'#1f2937'}" stroke-width="${v===0?1.5:1}" stroke-dasharray="${v===0?'0':'2,4'}"/>`).join('')}
    <!-- x ticky -->
    ${xTicks.map(m=>`<line x1="${xAt(m)}" y1="${padT+innerH}" x2="${xAt(m)}" y2="${padT+innerH+4}" stroke="#5e6b85"/>`).join('')}
    <!-- y labels -->
    ${yTicks.map(v=>`<text x="${padL-8}" y="${yAt(v)+4}" fill="#9aa3b7" font-size="10.5" text-anchor="end" font-family="ui-monospace,monospace">${fmtK(v)}</text>`).join('')}
    <!-- x labels -->
    ${xTicks.map(m=>`<text x="${xAt(m)}" y="${padT+innerH+18}" fill="#9aa3b7" font-size="10.5" text-anchor="middle" font-family="ui-monospace,monospace">${m}</text>`).join('')}
    <!-- popisky os -->
    <text x="${padL+innerW/2}" y="${H-8}" fill="#ffce1f" font-size="11.5" font-weight="700" text-anchor="middle" font-family="Sora,sans-serif">měsíce od počátku pronájmu</text>
    <text x="${20}" y="${padT+innerH/2}" fill="#ffce1f" font-size="11.5" font-weight="700" text-anchor="middle" font-family="Sora,sans-serif" transform="rotate(-90 20 ${padT+innerH/2})">kumulovaný cash flow ELKOPLAST (Kč)</text>
    <!-- nula čára label "Break-even" -->

/* ============================================================
   MODELACE: korelační tabulka (sazby × roky) + porovnávací graf
   ============================================================ */
const ROI_RATES = [0.015, 0.020, 0.025, 0.028, 0.030];   // 1,5 % až 3 % vč. 2,8 % standardní
const ROI_YEARS_MAT = [3, 4, 5];                          // sloupce tabulky
let ROI_MODEL = { presIdx: 0, yearsGraph: 3 };            // stav modelovacího panelu

/* Sleva pro danou délku závazku (nezávislá na STATE.years) */
function slevaForYears(years){
  if(years < GP.slevaOd) return 0;
  if(years >= GP.slevaDo) return GP.slevaMax;
  const t = (years - GP.slevaOd) / (GP.slevaDo - GP.slevaOd);
  return GP.slevaMin + t * (GP.slevaMax - GP.slevaMin);
}

/* Výpočet návratnosti pro JEDNU kombinaci (sazba × roky) — nezávisle na aktuálním STATE */
function roiVariant(p, rate, years){
  const zaklad = p.nakup;     // vždy nákupní cena (B) — možnost prodejní zrušena
  const sleva = slevaForYears(years);
  const monthly = zaklad * rate * (1 - sleva);
  const horizon = years * 12;
  const breakMonth = monthly > 0 ? Math.ceil(p.nakup / monthly) : Infinity;
  const totalProfit = monthly * horizon - p.nakup;
  return { rate, years, sleva, zaklad, monthly, breakMonth, horizon, totalProfit };
}

/* Status buňky (barva): podle vztahu break-even vs sjednaná doba */
function variantStatus(v){
  if(!isFinite(v.breakMonth) || v.breakMonth > v.horizon) return 'bad';
  if(v.breakMonth > v.horizon * 0.85) return 'warn';
  return 'ok';
}

/* HTML korelační tabulky - řádky = sazby, sloupce = roky */
function roiMatrixTable(p){
  const fmtBE = m => {
    if(!isFinite(m)) return '∞';
    if(m <= 12) return m + ' měs.';
    const y = Math.floor(m/12), mo = m % 12;
    return y + ' let ' + mo + ' měs.';
  };
  const rows = ROI_RATES.map(rate => {
    const cells = ROI_YEARS_MAT.map(years => {
      const v = roiVariant(p, rate, years);
      const status = variantStatus(v);
      const beTxt = fmtBE(v.breakMonth);
      const pfTxt = (v.totalProfit >= 0 ? '+' : '') + num(Math.round(v.totalProfit)) + ' Kč';
      const slevaTxt = v.sleva > 0 ? ' (sleva '+pct(v.sleva)+')' : '';
      return `<td class="roi-cell ${status}">
        <div class="rc-be">${beTxt}</div>
        <div class="rc-pf">${pfTxt}</div>
        <div class="rc-mt">${num(Math.round(v.monthly))} Kč/měs${slevaTxt}</div>
      </td>`;
    }).join('');
    return `<tr><th class="rc-rate">${pct(rate)}</th>${cells}</tr>`;
  }).join('');
  return `<table class="roi-matrix">
    <thead><tr><th class="rc-corner">Sazba ↓ &nbsp; Doba →</th>${ROI_YEARS_MAT.map(y=>`<th>${y} let (${y*12} měs.)</th>`).join('')}</tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

/* SVG graf - jedna doba, 4 křivky pro 4 sazby */
function roiModelChart(p, years){
  const variants = ROI_RATES.map(rate => roiVariant(p, rate, years));
  const horizon = years * 12;
  // X rozsah = horizont + 20% (ať je vidět konec závazku)
  const maxM = Math.max(horizon * 1.2, ...variants.map(v => isFinite(v.breakMonth) ? v.breakMonth*1.15 : 0), 24);
  const maxMRounded = Math.ceil(maxM / 6) * 6;
  // Y rozsah
  let yMin = -p.nakup * 1.05;
  let yMax = Math.max(...variants.map(v => v.monthly * maxMRounded - p.nakup)) * 1.1;
  if(yMax < 50000) yMax = 50000;

  const W = 760, H = 320, padL = 84, padR = 24, padT = 22, padB = 50;
  const innerW = W - padL - padR, innerH = H - padT - padB;
  const xAt = m => padL + (m / maxMRounded) * innerW;
  const yAt = v => padT + innerH - ((v - yMin) / (yMax - yMin)) * innerH;
  // 4 odstíny gradientně (nejnižší sazba = červenavá, nejvyšší = zelená)
  const rateColors = ['#e26060', '#fb923c', '#ffce1f', '#3ad17e'];

  // Y ticky
  const range = yMax - yMin;
  const stepRaw = range / 6;
  const mag = Math.pow(10, Math.floor(Math.log10(stepRaw)));
  const step = Math.ceil(stepRaw / mag) * mag;
  const yTicks = [];
  for(let v = Math.ceil(yMin/step)*step; v <= yMax; v += step) yTicks.push(v);
  const xStep = maxMRounded > 60 ? 12 : 6;
  const xTicks = [];
  for(let m = 0; m <= maxMRounded; m += xStep) xTicks.push(m);
  const fmtK = v => Math.abs(v) >= 1000 ? (v/1000).toFixed(0)+'k' : ''+Math.round(v);

  const y0 = yAt(0);
  const horizonX = xAt(horizon);

  const lines = variants.map((v, i) => {
    const color = rateColors[i];
    const pts = [];
    for(let m = 0; m <= maxMRounded; m++){
      pts.push(xAt(m) + ',' + yAt(v.monthly * m - p.nakup));
    }
    const beX = isFinite(v.breakMonth) && v.breakMonth <= maxMRounded ? xAt(v.breakMonth) : null;
    return {
      path: `<polyline points="${pts.join(' ')}" fill="none" stroke="${color}" stroke-width="2.2"/>`,
      beDot: beX !== null ? `<circle cx="${beX}" cy="${yAt(0)}" r="4.5" fill="${color}" stroke="#0f1218" stroke-width="2"/>` : '',
      color, label: pct(v.rate)
    };
  });

  return `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" class="roi-svg roi-svg-model" role="img" aria-label="Modelace návratnosti">
    <rect x="${padL}" y="${padT}" width="${innerW}" height="${innerH}" fill="#0d1118" rx="6"/>
    ${yTicks.map(v=>`<line x1="${padL}" y1="${yAt(v)}" x2="${padL+innerW}" y2="${yAt(v)}" stroke="${v===0?'#5e6b85':'#1f2937'}" stroke-width="${v===0?1.5:1}" stroke-dasharray="${v===0?'0':'2,4'}"/>`).join('')}
    ${xTicks.map(m=>`<line x1="${xAt(m)}" y1="${padT+innerH}" x2="${xAt(m)}" y2="${padT+innerH+4}" stroke="#5e6b85"/>`).join('')}
    <!-- konec závazku - svislá zelená čára -->
    <line x1="${horizonX}" y1="${padT}" x2="${horizonX}" y2="${padT+innerH}" stroke="#3ad17e" stroke-width="1.3" stroke-dasharray="6,4" opacity=".7"/>
    <text x="${horizonX-4}" y="${padT+12}" fill="#3ad17e" font-size="10.5" text-anchor="end" font-weight="700">konec ${years}-letého závazku</text>
    ${yTicks.map(v=>`<text x="${padL-8}" y="${yAt(v)+4}" fill="#9aa3b7" font-size="10.5" text-anchor="end" font-family="ui-monospace,monospace">${fmtK(v)}</text>`).join('')}
    ${xTicks.map(m=>`<text x="${xAt(m)}" y="${padT+innerH+18}" fill="#9aa3b7" font-size="10.5" text-anchor="middle" font-family="ui-monospace,monospace">${m}</text>`).join('')}
    <text x="${padL+innerW/2}" y="${H-8}" fill="#ffce1f" font-size="11.5" font-weight="700" text-anchor="middle" font-family="Sora,sans-serif">měsíce od počátku pronájmu</text>
    <text x="${20}" y="${padT+innerH/2}" fill="#ffce1f" font-size="11.5" font-weight="700" text-anchor="middle" font-family="Sora,sans-serif" transform="rotate(-90 20 ${padT+innerH/2})">kumulovaný cash flow (Kč)</text>
    <text x="${padL+innerW-6}" y="${y0-5}" fill="#5e6b85" font-size="10" text-anchor="end" font-style="italic">Break-even (0 Kč)</text>
    <rect x="${padL}" y="${y0}" width="${innerW}" height="${padT+innerH-y0}" fill="#fb715818"/>
    ${lines.map(l=>l.path).join('')}
    ${lines.map(l=>l.beDot).join('')}
  </svg>`;
}

/* HTML modelační sekce - výběr lisu (pokud víc), tabulka, graf */
function renderROIMatrix(items){
  // Výběr lisu
  if(ROI_MODEL.presIdx >= items.length) ROI_MODEL.presIdx = 0;
  const p = items[ROI_MODEL.presIdx].p;
  const pickerBtns = items.length > 1
    ? `<div class="roi-picker">

        ${items.map((o,i)=>`<button class="${i===ROI_MODEL.presIdx?'on':''}" data-mp="${i}">${prodIsZentex(o.p)?'Zentex ':'Bramidan '}${o.p.id}</button>`).join('')}
      </div>` : '';

  // Tlačítka volby doby pro graf
  const yrBtns = ROI_YEARS_MAT.map(y =>
    `<button class="${y===ROI_MODEL.yearsGraph?'on':''}" data-my="${y}">${y} let</button>`
  ).join('');

  // Legenda barev sazeb
  const rateColors = ['#e26060', '#fb923c', '#ffce1f', '#3ad17e'];
  const rateLegend = ROI_RATES.map((r,i) =>
    `<span class="roi-leg-item"><span class="roi-leg-dot" style="background:${rateColors[i]}"></span>sazba ${pct(r)}</span>`
  ).join('');

  return `
    ${pickerBtns}

    <div class="sec-title" style="margin-top:18px;font-size:14px">Korelační tabulka — break-even × zisk za sjednanou dobu</div>
    ${roiMatrixTable(p)}

    <div class="sec-title" style="margin-top:22px;font-size:14px">Porovnávací graf — 4 sazby v jednom grafu</div>

      <div class="roi-yearpick">
        <span class="roi-picker-lbl">Doba závazku v grafu:</span>

      </div>
      ${roiModelChart(p, ROI_MODEL.yearsGraph)}

    </div>`;
}

function renderLease(){
  const el=document.getElementById('panel-lease');
  const N = GP.leaseN;
  const iR = GP.leaseI;
  const fvFn = GP.leaseFVMode === 'old' ? residualPctOld : residualPct;
  const fvPct = fvFn(N);

  // Vybrané lisy z nabídky (jen Bramidan - leasing nemá pro Zentex smysl)
  const sel = STATE.selectedForOffer
    .map(id=>findProduct(id))
    .filter(p=>p && !prodIsZentex(p));

  // Cenotvorba s anuitou
  const calcLease = (p)=>{
    const PV = p.nakup;
    const FV = PV * fvPct;
    const PMT = bramidanPMT(PV, N, iR, FV);
    const servisMes = p.sKo / 12;
    const celkemMes = PMT + servisMes;
    const standardPMT = PV * GP.najemProc; // pro porovnání s 2,8 %
    const standardCelkem = standardPMT + servisMes;
    return {
      PV, FV, fvPct, PMT, servisMes, celkemMes,
      standardPMT, standardCelkem,
      celkemZaN: PMT * N + FV,           // suma plateb + výkupní cena
      sumPlateb: PMT * N,
      sumServisu: servisMes * N,
      sumCelkem: celkemMes * N + FV
    };
  };

  const items = sel.map(p=>({p, c:calcLease(p)}));
  const hasItems = items.length > 0;

/* ===== LEASINGOVÁ SMLOUVA (operativní leasing s anuitou) ===== */
function generateLeaseContractHTML(sel){
  const cl = STATE.client;
  const prof = Profiles.active();
  const N = GP.leaseN;
  const iR = GP.leaseI;
  const fvFn = GP.leaseFVMode === 'old' ? residualPctOld : residualPct;
  const fvPct = fvFn(N);
  const dnes = new Date().toLocaleDateString('cs-CZ');
  const dotNebo = v => v && v.trim() ? esc(v) : '…………………………………………';

  // Pro každý lis spočítej kalkulaci
  const items = sel.map(p=>{
    const PV = p.nakup;
    const FV = PV * fvPct;
    const PMT = bramidanPMT(PV, N, iR, FV);
    const servisMes = p.sKo / 12;
    return {p, PV, FV, PMT, servisMes, celkemMes: PMT+servisMes};
  });
  const sumPMT = items.reduce((s,it)=>s+it.PMT,0);
  const sumServis = items.reduce((s,it)=>s+it.servisMes,0);
  const sumCelkem = sumPMT + sumServis;
  const sumPV = items.reduce((s,it)=>s+it.PV,0);
  const sumFV = items.reduce((s,it)=>s+it.FV,0);
  const sumCelkemDPH = sumCelkem * (1+GP.dph);
  const dphCastka = sumCelkem * GP.dph;

  // Splátkový kalendář pro první lis (pokud více, ukázat agregát)
  const calendarItem = items[0];
  const generateCalendar = (it) => {
    const rows = [];
    const i = iR/12;
    let zustatek = it.PV;
    for(let m=1; m<=Math.min(N, 12); m++){ // jen prvních 12 měsíců + souhrn
      const urok = zustatek * i;
      const umoreni = it.PMT - urok;
      zustatek -= umoreni;
      rows.push(`<tr>
        <td>${m}.</td>
        <td>${num(Math.round(it.PMT))} Kč</td>
        <td>${num(Math.round(urok))} Kč</td>
        <td>${num(Math.round(umoreni))} Kč</td>
        <td>${num(Math.round(zustatek))} Kč</td>
      </tr>`);
    }
    // Souhrn za zbytek
    if(N > 12){
      // dokončit kalendář bez výpisu
      for(let m=13; m<=N; m++){
        const urok = zustatek * i;
        const umoreni = it.PMT - urok;
        zustatek -= umoreni;
      }
      rows.push(`<tr class="cal-skip">
        <td colspan="5" style="text-align:center;font-style:italic;color:#888">… měsíce 13–${N-1} (pravidelné splátky ${num(Math.round(it.PMT))} Kč) …</td>
      </tr>`);
      // Poslední řádek
      rows.push(`<tr>
        <td>${N}.</td>
        <td>${num(Math.round(it.PMT))} Kč</td>
        <td>${num(Math.round(zustatek*i))} Kč</td>
        <td>${num(Math.round(it.PMT-zustatek*i))} Kč</td>
        <td>${num(Math.round(it.FV))} Kč <span style="font-size:10px;color:var(--gold-d)">← FV</span></td>
      </tr>`);
    }
    return rows.join('');
  };

  return `
  <article class="contract">
    <header class="ctr-head">
      <h1>Smlouva o operativním leasingu</h1>
      <div class="ctr-sub">s opcí výkupu předmětu leasingu</div>

    </header>

    <p>Níže uvedené smluvní strany:</p>

      <tr><td class="k">Kontaktní osoba:</td><td class="v">${prof ? esc(prof.name) + (prof.email?', e-mail '+esc(prof.email):'') + (prof.phone?', tel. '+esc(prof.phone):'') : '………………………………'}</td></tr>
      <tr><td class="k">Bankovní spojení:</td><td class="v">…………………………………………</td></tr>

    <div class="ctr-and">a</div>

    <table class="ctr-party">
      <tr><th colspan="2">Nájemce:</th></tr>

/* Export leasingové smlouvy jako .doc */
function exportLeaseContractAsDoc(){
  const html = document.getElementById('leaseContractDoc').innerHTML;
  const wordHTML = `<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word"><head><meta charset="utf-8"><title>Leasingova smlouva</title>
<style>
body{font-family:'Times New Roman',serif;font-size:11pt;line-height:1.4}
h1{font-size:18pt;text-align:center;margin:0 0 4pt}
h2{font-size:13pt;border-bottom:1px solid #000;padding-bottom:2pt;margin-top:14pt}
h3{font-size:12pt;margin-top:8pt}
table{border-collapse:collapse;width:100%;margin:6pt 0;font-size:10pt}
table.ctr-party td,table.ctr-price td,table.spec-tbl td{padding:3pt 6pt;border:1px solid #888;vertical-align:top}
table.ctr-party th,table.ctr-price th,table.spec-tbl th{padding:3pt 6pt;background:#eee;border:1px solid #888;text-align:left}
.ctr-and{text-align:center;margin:4pt;font-style:italic}
.ctr-and-sub{margin:2pt 0 10pt 0;font-style:italic}
.ctr-pagebreak{page-break-before:always}
.ctr-list li{margin-bottom:4pt}
</style></head><body>${html}</body></html>`;
  const blob = new Blob(['\ufeff'+wordHTML], {type:'application/msword'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'Leasingova_smlouva_ELKOPLAST_'+new Date().toISOString().slice(0,10)+'.doc';
  a.click();
  URL.revokeObjectURL(url);
  toast('Leasingová smlouva stažena');
}

      <h2>10. Záložka „Leasing (anuita)" — alternativní financování</h2>
      <p>Speciální záložka pro alternativní cenotvorbu — operativní leasing s opcí výkupu inspirovaný metodikou Bramidan. Vhodný pro velké stroje a klienty s tlakem na cash flow.</p>

      <h3>10.1 Kdy nabídnout leasing místo standardu 2,8 %</h3>
      <div class="man-yes-no">
        <div class="man-yes">
          <h4>✓ ANO — jdi do anuity</h4>
          <ul>
            <li>Velké stroje (B50, X50, B50 XL SD) — standardní 2,8 % je 15–17 tis. Kč/měs, leasing 9–11 tis.</li>
            <li>Klient zmíní oficiální nabídku Bramidan</li>
            <li>Klient signalizuje cash flow tlak</li>
            <li>Klient plánuje stroj odkoupit v budoucnu</li>
            <li>Dlouhodobá spolupráce 5+ let</li>
            <li>Velký výrobní podnik s vyspělým controllingem</li>
          </ul>
        </div>
        <div class="man-no">
          <h4>✗ NE — drž 2,8 %</h4>
          <ul>
            <li>Malé stroje (B3, B4, B5) — anuita marginálně levnější</li>
            <li>Klient chce krátký závazek do 36 měsíců</li>
            <li>Klient nemá vyspělé účetnictví</li>
            <li>Klient má nestabilní situaci (startup, restrukturalizace)</li>
            <li>Klient chce okamžité vlastnictví — pak prodej</li>
            <li>Mobilní lisy Zentex — mají vlastní cenový model</li>
          </ul>
        </div>
      </div>

      <h3>10.2 Anuitní vzorec</h3>
      <p class="man-formula">PMT = (PV × (1+i)<sup>N</sup> − FV) × i / ((1+i)<sup>N</sup> − 1)</p>
      <p>kde PV = pořizovací cena, N = doba (default 60 měsíců), i = měsíční úrok (default 7,9 % p.a. / 12), FV = zůstatková hodnota (default 30 % z PV při N=60).</p>

      <h2>13. Cenotvorba — jak to funguje</h2>

      <h3>13.1 Bramidan — fixní 2,8 % z nákupní ceny</h3>
      <p>Měsíční pronájem Bramidan = nákupní cena stroje (bez DPH) × 2,8 %. Doba návratnosti 36 měsíců. Servis je vždy navíc — kompletní servisní balíček (sKo) rozložený do 12 měsíčních splátek.</p>
      <p><b>Příklad — Bramidan X40 wide:</b></p>
      <ul>
        <li>Nákupní cena: 336 000 Kč</li>
        <li>Měsíční nájem: 336 000 × 2,8 % = 9 408 Kč</li>
        <li>Měsíční servis: 15 000 / 12 = 1 250 Kč</li>
        <li>CELKEM klientovi: <b>10 658 Kč/měs bez DPH</b></li>
        <li>S DPH 21 %: 12 896 Kč/měs</li>
      </ul>

      <h3>13.2 Zentex — fixní cena dle objemu (vč. servisu)</h3>
      <p>Pro Zentex je cenotvorba odlišná — fixní cena podle objemu kontejneru. Cena již zahrnuje kompletní servis. Klient vidí jen finální Kč.</p>

    <!-- 16. TIPY -->
    <section class="man-sec" id="man-tips">
      <h2>16. Tipy pro obchodníky</h2>

      <h3>16.1 Před první schůzkou s klientem</h3>
      <ul>
        <li>Zjistěte aktuální stav: kolik t/měsíc lisuje, jaký materiál, jak často sváží.</li>
        <li>Pro Zentex: zjistěte vozový park (hákový vs. řetězový) — rozhoduje hned.</li>
        <li>Pro Bramidan: zjistěte velikost balíku, kterou kupuje výkup (1200×800 vs. wide).</li>
        <li>Prostorové omezení: výška stropu (LP řada = low profile), prostor pro nakládání.</li>
        <li>Konkurenční nabídka: požádejte klienta o referenci.</li>
      </ul>

      <h3>16.2 Argumentace pro pronájem 2,8 %</h3>
      <ul>
        <li>Žádná investice — klient nemusí vyndat 300 000 Kč najednou.</li>
        <li>Kompletní servis v ceně — žádné nečekané výdaje na opravy.</li>
        <li>Vlastnictví u ELKOPLAST — žádné riziko technického zastarání.</li>
        <li>Sleva za závazek 5+ let — motivuje k dlouhodobému vztahu.</li>
        <li>Flexibilita: po skončení doby určité lze prodloužit nebo ukončit.</li>
      </ul>

      <h3>16.3 Argumentace pro leasing s anuitou</h3>
      <ul>
        <li>Nižší měsíční splátka (typicky o 30–40 % oproti 2,8 %).</li>
        <li>Celá splátka daňově uznatelná dle § 24 odst. 2 písm. h) ZDP.</li>
        <li>Off-balance sheet — neaktivuje se v rozvaze klienta.</li>
        <li>Opce výkupu na konci — klient si vybere mezi vlastnictvím, vrácením nebo prodloužením.</li>
        <li>Pro CFO: cash flow argument je silnější než nominální výdaj.</li>
      </ul>

      <h3>16.4 Argumentace pro prodej</h3>
      <ul>
        <li>Klient se stane vlastníkem ihned po zaplacení.</li>
        <li>Možnost dál pronajímat, prodat, ručit majetkem.</li>
        <li>Plné odpisy podle § 26–32 ZDP, doba 5 let lineárně.</li>
        <li>Po skončení odpisu už nepředstavuje žádný náklad — „stroj zadarmo".</li>
        <li>Pro klienty s 10+ letým horizontem využití je celkově nejlevnější.</li>
      </ul>

      <div class="man-warn">
        <h4>⚠️ 16.5 Časté chyby, kterým se vyhněte</h4>
        <ul>
          <li><b>NIKDY</b> neuvádějte v nabídce sazbu 2,8 % — klient by si přepočetl marži.</li>
          <li><b>NIKDY</b> neuvádějte „Zentex" v PDF nabídce — klient vidí jen typ stroje.</li>
          <li><b>NIKDY</b> nepoužívejte „nájem + servis" rozpad pro Zentex — jen finální cena vč. servisu.</li>
          <li><b>NIKDY</b> nezapomeňte DPH — je legitimní informace, kterou klient musí vidět.</li>
          <li>Pozor na malé Bramidan modely (B3, B4) — anuita pro ně nemá smysl, jen administrativa.</li>
          <li>Pozor na krátké závazky pod 36 měsíců s anuitou — vychází drahá kvůli vysoké FV.</li>
          <li>Při generování smlouvy zkontrolujte všechna pole klienta (IČ, DIČ, sídlo).</li>
        </ul>
      </div>
    </section>

    list.forEach(p=>{

      let sP=0,sS=0,sO=0;
      sel.forEach(p=>{ const c=calc(p,STATE.serviceMode); sP+=c.prodejni;sS+=c.servisRok;sO+=c.oneTimeTotal;
        o.push([C.b(nameOf(p)),C.s(specOf(p)),C.moneyB(Math.round(c.prodejni)),C.money(Math.round(c.servisRok)),C.money(Math.round(c.oneTimeTotal))]); });

      o.push([C.b('CELKEM bez DPH'),null,C.moneyB(Math.round(sP)),C.moneyB(Math.round(sS)),C.moneyB(Math.round(sO))]);
      o.push([C.s('DPH '+pct(GP.dph)),null,C.money(Math.round(sP*GP.dph)),C.money(Math.round(sS*GP.dph)),C.money(Math.round(sO*GP.dph))]);
      o.push([C.b('CELKEM s DPH'),null,C.moneyB(Math.round(sP*(1+GP.dph))),C.moneyB(Math.round(sS*(1+GP.dph))),C.moneyB(Math.round(sO*(1+GP.dph)))]);
    } else {
      o.push([C.h('Model'),C.h('Specifikace'),C.h('Nájem/měs (bez DPH)'),C.h('Pronájem/měs vč. servisu (bez DPH)'),C.h((isIndefinite()?'Ročně':'Celkem za období')+' (bez DPH)'),C.h('Jednoráz. celkem (bez DPH)')]);

        o.push([C.b(nameOf(p)),C.s(specOf(p)),C.money(Math.round(c.najemMesic)),
          C.moneyB(Math.round(c.celkemMesicVcServ)),C.money(Math.round(per)),C.money(Math.round(c.oneTimeTotal))]);
      });
      o.push([]);
      o.push([C.b('CELKEM bez DPH'),null,null,C.moneyB(Math.round(sumMonth)),C.moneyB(Math.round(sumPeriod)),C.moneyB(Math.round(sumOne))]);
      o.push([C.s('DPH '+pct(GP.dph)),null,null,C.money(Math.round(sumMonth*GP.dph)),C.money(Math.round(sumPeriod*GP.dph)),C.money(Math.round(sumOne*GP.dph))]);
      o.push([C.b('CELKEM s DPH'),null,null,C.moneyB(Math.round(sumMonth*(1+GP.dph))),C.moneyB(Math.round(sumPeriod*(1+GP.dph))),C.moneyB(Math.round(sumOne*(1+GP.dph)))]);
    }
    o.push([]);
    o.push([C.s('Ceny bez DPH ('+pct(GP.dph)+'). '+(sale?'Prodejní cena za stroj. ':'Pronájem = '+pct(GP.najemProc)+' z '+najemZakladLabel()+' ceny + servis. ')+(sl>0?'Vč. slevy '+pct(sl)+' za závazek '+STATE.years+' '+rokyWord(STATE.years)+'. ':'')+'Jednorázové položky (doprava, instalace, zaškolení) účtovány zvlášť. Nabídka je nezávazná.')]);
    sheets.push({name:'Nabídka',rows:o});
  }

  // ----- LIST 3: Parametry -----
  const par=[];
  par.push([C.t('Globální parametry modelu')]);
  par.push([]);
  par.push([C.h('Parametr'),C.h('Hodnota')]);
  par.push([C.b('Měsíční sazba pronájmu'),C.s(pct(GP.najemProc)+' z '+najemZakladLabel()+' ceny')]);
  par.push([C.b('Marže pro prodej'),C.s(pct(GP.marze))]);
  par.push([C.b('Inflační koeficient'),C.s(pct(GP.inflace))]);
  par.push([C.b('Sleva — rozsah'),C.s(pct(GP.slevaMin)+' – '+pct(GP.slevaMax))]);
  par.push([C.b('Sleva — hranice'),C.s(GP.slevaOd+' – '+GP.slevaDo+' let')]);
  par.push([C.b('Doporučená min. doba'),C.s(GP.minRoky+' let')]);
  par.push([C.b('Kurz EUR/CZK'),C.s(GP.kurz+' Kč')]);
  par.push([C.b('DPH'),C.s(pct(GP.dph))]);
  par.push([]);
  par.push([C.t('Jednorázové položky (účtováno zvlášť)')]);
  par.push([]);
  par.push([C.h('Položka'),C.h('Částka')]);
  ONE_TIME.forEach(it=>par.push([C.b(it.name),C.money(+it.amount||0)]));
  par.push([]);
  par.push([C.t('Ceník Bramidan — vertikální lisy')]);
  par.push([]);
  par.push([C.h('Model'),C.h('Nákupní cena'),C.h('Doprava'),C.h('Servis elektro'),C.h('Servis bezp.'),C.h('Kompletní servis'),C.h('Min t/měs'),C.h('Max t/měs'),C.h('Motor kW'),C.h('Olej L')]);
  PRESSES.forEach(p=>par.push([C.b(p.id),C.money(p.nakup),C.money(p.doprava),C.money(p.sEl),C.money(p.sBz),C.money(p.sKo),C.n(p.minT),C.n(p.maxT),C.s((p.kw||'')+' kW'),C.s((p.oil||'')+' L')]));
  par.push([]);
  par.push([C.t('Ceník Zentex — mobilní lisovací stroje')]);
  par.push([]);
  par.push([C.h('Model'),C.h('EUR'),C.h('Nákupní cena Kč'),C.h('Doprava'),C.h('Servis elektro'),C.h('Servis bezp.'),C.h('Kompletní servis'),C.h('Min t/měs'),C.h('Max t/měs'),C.h('Motor'),C.h('Olej L')]);
  COMPACTORS.forEach(p=>par.push([C.b('Zentex '+p.id),C.s(p.eur+' €'),C.money(p.nakup),C.money(p.doprava),C.money(p.sEl),C.money(p.sBz),C.money(p.sKo),C.n(p.minT),C.n(p.maxT),C.s(p.motor),C.s((p.oil||'')+' L')]));
  sheets.push({name:'Parametry',rows:par});

  return sheets;

function exportExcel(silent){
  try{
    const blob=XLSX_MINI.build(buildExcelSheets());
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);
    const cl=STATE.client.company?('-'+STATE.client.company.replace(/[^a-zA-Z0-9]/g,'_').slice(0,30)):'';
    const fname='Kalkulace-lisy-ELKOPLAST'+cl+'.xlsx';
    a.download=fname;a.click();
    if(!silent) toast('Excel vyexportován');
    return fname;
  }catch(e){ toast('Chyba exportu Excelu'); console.error(e); return null; }
}

/* ---------- ODESLAT E-MAILEM (vyvolá poštovního klienta) ---------- */
function offerSummaryText(){
  const sel=STATE.selectedForOffer.map(id=>findProduct(id)).filter(Boolean);
  const cl=STATE.client; const prof=Profiles.active(); const sl=currentSleva(); const sale=isSale();
  const L=[];
  L.push('Dobrý den'+(cl.name?', '+cl.name:'')+',');
  L.push('');
  L.push('zasíláme nezávaznou cenovou nabídku na lisovací techniku ELKOPLAST dle Vaší poptávky.');
  L.push('');
  L.push('PARAMETRY POPTÁVKY');
  L.push('  Forma: '+(sale?'prodej lisu':'pronájem'));
  L.push('  Druh odpadu: '+(cl.waste||'—'));
  if(!sale){
    L.push('  Množství odpadu: '+STATE.tonsPerMonth.toLocaleString('cs-CZ')+' t/měsíc');
    L.push('  Doba pronájmu: '+termLabel()+(sl>0?'  (sleva '+pct(sl)+')':''));
  }
  L.push('  Rozsah servisu: '+servLabel());
  L.push('');
  if(sel.length){
    L.push('NABÍDKA');
    let sM=0,sP=0,sO=0,sProd=0,sServ=0;
    sel.forEach(p=>{
      const c=calc(p,STATE.serviceMode);
      const pz=prodIsZentex(p);
      const nm=(pz?'Zentex ':'Bramidan ')+p.id;
      const spec=pz?(p.vol+' m³, '+p.carrier):(p.serie+'-série, '+p.force+' t');
      sO+=c.oneTimeTotal;
      if(sale){
        sProd+=c.prodejni; sServ+=c.servisRok;
        L.push('  • '+nm+' ('+spec+') — prodejní cena '+num(c.prodejni)+' Kč bez DPH ('+num(c.prodejniDph)+' s DPH)');
        L.push('      '+(c.servisRok>0?servLabel()+' servis '+num(c.servisRok)+' Kč/rok · ':'')+'jednorázově '+num(c.oneTimeTotal)+' Kč (vše bez DPH)');
      } else {
        const per=c.indef?c.celkemRokVcServ:c.celkemObdobi;
        sM+=c.celkemMesicVcServ; sP+=per;
        L.push('  • '+nm+' ('+spec+') — pronájem '+num(c.celkemMesicVcServ)+' Kč/měs bez DPH ('+num(c.celkemMesicVcServDph)+' s DPH)');
        L.push('      nájem '+num(c.najemMesic)+' + servis '+num(c.servisMesic)+' Kč/měs · jednorázově '+num(c.oneTimeTotal)+' Kč (bez DPH)');
      }
    });
    L.push('');
    const dphPct = pct(GP.dph);
    if(sale){
      L.push('  CELKEM bez DPH: prodej '+num(sProd)+' Kč · servis '+num(sServ)+' Kč/rok · jednorázově '+num(sO)+' Kč');
      L.push('  CELKEM s DPH ('+dphPct+'): prodej '+num(Math.round(sProd*(1+GP.dph)))+' Kč · servis '+num(Math.round(sServ*(1+GP.dph)))+' Kč/rok · jednorázově '+num(Math.round(sO*(1+GP.dph)))+' Kč');
    } else {
      L.push('  CELKEM bez DPH: '+num(sM)+' Kč/měs · '+num(sP)+(isIndefinite()?' Kč ročně':' Kč za '+termLabel())+' · jednorázově '+num(sO)+' Kč');
      L.push('  CELKEM s DPH ('+dphPct+'): '+num(Math.round(sM*(1+GP.dph)))+' Kč/měs · '+num(Math.round(sP*(1+GP.dph)))+(isIndefinite()?' Kč ročně':' Kč za '+termLabel())+' · jednorázově '+num(Math.round(sO*(1+GP.dph)))+' Kč');
    }
  } else {
    const recs=selectedPresses();
    L.push('DOPORUČENÉ MODELY: '+(recs.map(p=>p.id).join(', ')||'—'));
  }
  L.push('');
  L.push('Ceny v rozpisu jsou uvedeny BEZ DPH ('+pct(GP.dph)+'). Pro úplnost je celkový součet uveden i s DPH.'+(sale?'':' Měsíční pronájem zahrnuje kompletní servis.')+' Jednorázové položky (doprava, instalace, zaškolení) se účtují zvlášť. Podrobnou nabídku (PDF) a kalkulaci (Excel) přikládáme.');
  L.push('');
  L.push('S pozdravem');
  if(prof){
    L.push(prof.name||'');
    if(prof.email)L.push(prof.email);
    if(prof.phone)L.push('tel.: '+prof.phone);
    L.push('ELKOPLAST CZ s.r.o.');
  } else {
    L.push((cl.name?cl.name+'\n':'')+'ELKOPLAST CZ s.r.o.');
  }
  return L.join('\n');
}

function bindTopActions(){
  document.getElementById('btnExport').onclick=()=>{
    const data={GP,ONE_TIME,PRESSES:PRESSES.map(p=>({id:p.id,nakup:p.nakup,doprava:p.doprava,sEl:p.sEl,sBz:p.sBz,sKo:p.sKo,minT:p.minT,maxT:p.maxT,kw:p.kw,oil:p.oil})),COMPACTORS:COMPACTORS.map(p=>({id:p.id,nakup:p.nakup,doprava:p.doprava,sEl:p.sEl,sBz:p.sBz,sKo:p.sKo,minT:p.minT,maxT:p.maxT,oil:p.oil})),STATE:{tonsPerMonth:STATE.tonsPerMonth,mode:STATE.mode,selectMode:STATE.selectMode,baleChoice:STATE.baleChoice,feedChoice:STATE.feedChoice,termMode:STATE.termMode,years:STATE.years,months:STATE.months,serviceMode:STATE.serviceMode,client:STATE.client,selectedForOffer:STATE.selectedForOffer,product:STATE.product}};
    const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='kalkulace-lisy-parametry.json';a.click();
    toast('Parametry uloženy');
  };
  document.getElementById('btnImport').onclick=()=>document.getElementById('fileImport').click();
  document.getElementById('fileImport').onchange=(e)=>{
    const f=e.target.files[0]; if(!f)return;
    const r=new FileReader();
    r.onload=()=>{ try{
      const d=JSON.parse(r.result);
      if(d.GP)Object.assign(GP,d.GP);
      // VŽDY vynutit 2,8 % - dlouhodobá sazba 2,5 % byla zrušena
      GP.najemProc = 0.0278;
      if(d.ONE_TIME)ONE_TIME=d.ONE_TIME;
      if(d.PRESSES)d.PRESSES.forEach(sp=>{const p=PRESSES.find(x=>x.id===sp.id);if(p)Object.assign(p,sp);});
      if(d.COMPACTORS)d.COMPACTORS.forEach(sp=>{const p=COMPACTORS.find(x=>x.id===sp.id);if(p)Object.assign(p,sp);});
      if(d.STATE)Object.assign(STATE,d.STATE);
      render(); toast('Parametry načteny');
    }catch(err){ toast('Chyba načítání souboru'); } };
    r.readAsText(f);
  };
  document.getElementById('btnExcel').onclick=exportExcel;
  document.getElementById('btnMail').onclick=sendEmail;
  document.getElementById('btnProfile').onclick=openProfileModal;
  document.getElementById('authBtn').onclick=openAuthModal;
  document.getElementById('btnPrint').onclick=()=>{
    if(!STATE.selectedForOffer.length){ switchTab('compare'); toast('Nejprve přidejte lisy do nabídky'); return; }
    switchTab('offer'); setTimeout(()=>window.print(),300);
  };
}

  const close=()=>ov.remove();

  document.getElementById('profClose').onclick=close;
  // výběr aktivního
  ov.querySelectorAll('[data-pick]').forEach(el=>el.onclick=()=>{ Profiles.setActive(el.dataset.pick); refreshProfileUI(); reopenProfile(); });
  // smazat
  ov.querySelectorAll('[data-del]').forEach(b=>b.onclick=(e)=>{ e.stopPropagation();
    const p=Profiles.all().find(x=>x.id===b.dataset.del);
    if(confirm('Smazat profil '+(p&&p.name?p.name:'')+'?')){ Profiles.remove(b.dataset.del); refreshProfileUI(); reopenProfile(); }
  });
  // editovat → naplň formulář
  ov.querySelectorAll('[data-edit]').forEach(b=>b.onclick=(e)=>{ e.stopPropagation();
    const p=Profiles.all().find(x=>x.id===b.dataset.edit); if(!p)return;
    document.getElementById('profEditId').value=p.id;
    document.getElementById('profName').value=p.name||'';
    document.getElementById('profEmail').value=p.email||'';

function bindAuthModal(){
  const ov=document.getElementById('authModal'); if(!ov)return;
  const close=()=>ov.remove();
  ov.onclick=(e)=>{ if(e.target===ov)close(); };
  const x=document.getElementById('authClose'); if(x)x.onclick=close;
  const x2=document.getElementById('authClose2'); if(x2)x2.onclick=close;
  ov.querySelectorAll('[data-am]').forEach(b=>b.onclick=()=>{
    _authMode=b.dataset.am;
    ov.innerHTML=authModalHTML();
    bindAuthModal();
  });
  const logoutBtn=document.getElementById('authLogout');
  if(logoutBtn) logoutBtn.onclick=async ()=>{
    await Auth.logout();
    close();
    refreshAuthUI();
    toast('Odhlášeno');
    if(STATE.activeTab==='history') renderHistory();
  };
  const submit=document.getElementById('authSubmit');
  if(submit) submit.onclick=async ()=>{
    const err=document.getElementById('authError');
    err.style.display='none'; err.textContent='';
    submit.disabled=true; submit.textContent='…';
    try{
      const email=document.getElementById('authEmail').value.trim();
      const password=document.getElementById('authPassword').value;
      if(_authMode==='register'){
        const name=(document.getElementById('authName')||{value:''}).value.trim();
        await Auth.register(email, name, password);
        toast('Účet vytvořen, jste přihlášen');
      } else {
        await Auth.login(email, password);
        toast('Přihlášeno');
      }
      close();
      refreshAuthUI();
      if(STATE.activeTab==='history') renderHistory();
    }catch(e){
      err.textContent=e.message||'Chyba';
      err.style.display='block';
      submit.disabled=false;
      submit.textContent=_authMode==='register'?'Vytvořit účet':'Přihlásit';
    }
  };
  // Enter klávesa odešle formulář
  ['authEmail','authPassword','authName'].forEach(id=>{
    const inp=document.getElementById(id); if(inp) inp.onkeydown=(e)=>{ if(e.key==='Enter' && submit && !submit.disabled){ e.preventDefault(); submit.click(); } };
  });
}

function refreshAuthUI(){
  const lbl=document.getElementById('authLabel');
  if(lbl) lbl.textContent = Auth.isLoggedIn() ? (Auth.user().name||Auth.user().email).split(' ')[0] : 'Účet';
  const btn=document.getElementById('authBtn');
  if(btn) btn.classList.toggle('auth-on', Auth.isLoggedIn());
}

<script>

var _inboxNewCount = 0;

function applyLeadToState(lead){
  var p = lead.params || {};

async function refreshInboxCount(){

<script>
/* ===== SSO Z INTRANETU (mobilnirozhlas) =====
   ?sso=<token> → výměna za session nabídkové aplikace, pak reload bez tokenu (lead parametry zůstanou). */
(function () {
  try {
    var q = new URLSearchParams(location.search);
    var sso = q.get('sso');
    if (!sso) return;
    q.delete('sso');
    var clean = location.pathname + (q.toString() ? '?' + q.toString() : '') + location.hash;
    fetch('/api/sso', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ token: sso }) })
      .then(function (r) { return r.ok ? r.json() : null; })
      .then(function (d) { if (d && d.token && d.user && typeof Auth !== 'undefined') Auth.setSession(d.token, d.user); })
      .catch(function () {})
      .then(function () { location.replace(clean); });
  } catch (e) { /* ignore */ }
})();
</script>
<script>

   Aktivuje se POUZE když je v URL ?lead=1. Předvyplní produkt, formu, tonáž a klienta. */
(function () {
  var tries = 0;
  function apply() {
    if (typeof STATE === 'undefined') { if (tries++ < 40) return setTimeout(apply, 150); return; }
    try {
      var q = new URLSearchParams(location.search);
      if (q.get('lead') !== '1') return;
      var product = q.get('product');
      if (product === 'bramidan' || product === 'zentex') STATE.product = product;
      var mode = q.get('mode');
      if (['rent', 'sale', 'lease'].indexOf(mode) >= 0) STATE.mode = mode;
      var tons = parseFloat(q.get('tons'));
      if (!isNaN(tons) && tons > 0) { STATE.selectMode = 'tons'; STATE.tonsPerMonth = tons; }
      STATE.client = STATE.client || {};
      if (q.get('company')) STATE.client.company = q.get('company');
      if (q.get('name'))    STATE.client.name    = q.get('name');
      if (q.get('contact')) STATE.client.contact = q.get('contact');
      if (q.get('waste'))   STATE.client.waste   = q.get('waste');
      if (typeof render === 'function') render();
    } catch (e) { console.warn('Prefill z poptávky selhal:', e); }
  }
  apply();
})();
</script>
</body>
</html>
